apiVersion: v2
name: otterscale-mw-operator
version: 1.3.3-rc.0
appVersion: 0.4.55-otterscale
description: Umbrella chart that wraps phison-mw-operator with OtterScale-flavored defaults
  (monitoring on, ai_gateway off, AI100=1, mw image pinned, workload PVC export on,
  Valkey-HA storage class pinned to otterscale-local-path).
sources:
  - https://github.com/otterscale/charts
maintainers:
  - name: george_wu
    email: george_wu@phison.com
keywords:
  - llm
  - kvcache
  - mooncake
  - lmcache
  - otterscale
type: application
kubeVersion: '>= 1.30.0-0'
annotations:
  module.otterscale.io/namespace: "phison-mw-operator"
  module.otterscale.io/post-renderer: >-  
    postRenderers[0].kustomize.patches[0].target.group=serving.kserve.io,  
    postRenderers[0].kustomize.patches[0].target.version=v1alpha2,  
    postRenderers[0].kustomize.patches[0].target.kind=LLMInferenceServiceConfig,  
    postRenderers[0].kustomize.patches[0].patch[0].op=add,  
    postRenderers[0].kustomize.patches[0].patch[0].path=/metadata/namespace,  
    postRenderers[0].kustomize.patches[0].patch[0].value=otterscale-system
dependencies:
  - name: phison-mw-operator
    version: 0.4.55-otterscale
    repository: oci://cr-ext.phison.com/otterscale
