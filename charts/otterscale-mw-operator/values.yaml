# Umbrella defaults — equivalent to passing the following to phison-mw-operator:
#   --set monitoring.enabled=true
#   --set ai_gateway.enabled=false
#   --set cache-tier.resources.ai100=1
#   --set cache-tier.lmcache.l1_size_gb=32
#   --set cache-tier.lmcache.mooncake_global_segment_size_bytes=68719476736
#   --set cache-tier.images.mw=harbor.phison.com/ai-mw/mw:501-0004.001
#   --set cache-tier.workload_pvc_export.enabled=true
#   --set cache-tier.workload_pvc_export.vllm_cache_storage_class=otterscale-local-path
#   --set cache-tier.workload_pvc_export.s3_credentials_secret=models
#   --set cache-tier.workload_pvc_export.s3_endpoint_host_port=rook-ceph-rgw-ceph-objectstore.rook-ceph.svc:8301
#   --set valkey-ha.global.storageClass=otterscale-local-path
phison-mw-operator:
  monitoring:
    enabled: true

  ai_gateway:
    enabled: false

  cache-tier:
    resources:
      ai100: 1
    lmcache:
      l1_size_gb: 32
      mooncake_global_segment_size_bytes: 68719476736
    images:
      mw: harbor.phison.com/ai-mw/mw:501-0004.001
    workload_pvc_export:
      enabled: true
      vllm_cache_storage_class: otterscale-local-path
      s3_credentials_secret: models-kserve
      s3_endpoint_host_port: rook-ceph-rgw-ceph-objectstore.rook-ceph.svc:8301

  valkey-ha:
    global:
      storageClass: otterscale-local-path
