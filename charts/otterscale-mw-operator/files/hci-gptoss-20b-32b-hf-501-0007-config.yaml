apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceServiceConfig
metadata:
  name: gptoss-20b-mw-llmis-config
  annotations:
    phison-mw.ai/served-model-name: "gpt-oss-20b"
    phison-mw.ai/epp-block-size: "32"
    phison-mw.ai/render-model-cache-size: "32Gi"
    phison-mw.ai/render-trust-remote-code: "true"
spec:
  replicas: 1
  model:
    name: gpt-oss-20b
    uri: hf://openai/gpt-oss-20b
  storageInitializer:
    enabled: true
  template:
    serviceAccountName: default
    runtimeClassName: nvidia
    schedulerName: hami-scheduler
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: node-role.phison.mw/gpu
              operator: In
              values:
              - "true"
    containers:
    - image: harbor.phison.com/ai-mw/mw:501-0007.002
      imagePullPolicy: IfNotPresent
      name: main
      ports:
      - containerPort: 8000
        name: vllm
        protocol: TCP
      command:
      - vllm
      - serve
      - /mnt/models
      args:
      - --served-model-name
      - gpt-oss-20b
      - --max-model-len
      - '65536'
      - --port
      - '8000'
      - --tensor-parallel-size
      - '1'
      - --disable-custom-all-reduce
      - --enable-prefix-caching
      - --gpu-memory-utilization=0.9
      - --limit-mm-per-prompt
      - '{"image":0,"audio":0,"video":0}'
      - --disable-uvicorn-access-log
      - --block-size
      - '32'
      - --prefix-caching-hash-algo
      - sha256_cbor
      - --kv-events-config
      - '{"enable_kv_cache_events":true,"publisher":"zmq","endpoint":"tcp://*:5557","topic":"kv@$(POD_IP):8000@gpt-oss-20b"}'
      - --kv-transfer-config
      - '{"kv_connector":"LMCacheMPConnector","kv_role":"kv_both","kv_connector_extra_config":{"lmcache.mp.host":"tcp://127.0.0.1","lmcache.mp.port":5757}}'
      env:
      - name: SERVED_MODEL_NAME
        value: "gpt-oss-20b"
      - name: VLLM_LOGGING_LEVEL
        value: INFO
      - name: FLASHINFER_DISABLE_VERSION_CHECK
        value: '1'
      - name: CUDA_DISABLE_CONTROL
        value: 'true'
      - name: NCCL_CUMEM_HOST_ENABLE
        value: '0'
      - name: LMCACHE_LOG_LEVEL
        value: INFO
      - name: LIBRARY_PATH
        value: /usr/lib/x86_64-linux-gnu:/usr/local/cuda-13.0/compat:/usr/local/cuda/compat
      - name: LMCACHE_USE_EXPERIMENTAL
        value: 'True'
      - name: PYTHONHASHSEED
        value: '0'
      - name: PROMETHEUS_MULTIPROC_DIR
        value: /tmp/lmcache_prometheus
      - name: POD_IP
        valueFrom:
          fieldRef:
            apiVersion: v1
            fieldPath: status.podIP
      - name: HOST_IP
        valueFrom:
          fieldRef:
            apiVersion: v1
            fieldPath: status.hostIP
      securityContext:
        runAsNonRoot: false
      livenessProbe:
        httpGet:
          path: /health
          port: vllm
          scheme: HTTP
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /v1/models
          port: vllm
          scheme: HTTP
        periodSeconds: 30
        timeoutSeconds: 2
        failureThreshold: 3
      startupProbe:
        httpGet:
          path: /v1/models
          port: vllm
          scheme: HTTP
        initialDelaySeconds: 60
        periodSeconds: 15
        timeoutSeconds: 5
        failureThreshold: 80
      volumeMounts:
      - mountPath: /dev/shm
        name: host-dev-shm
      - mountPath: /tmp/lmcache_prometheus
        name: lmcache-prometheus
      - mountPath: /etc/ssl/certs
        name: tls-certs
        readOnly: true
      resources:
        limits:
          cpu: "8"
          # TP=1: weights live in GPU (gpumem 90k); host RSS is only CUDA
          # context + Python + transient load buffers (~10-20Gi peak). The
          # LMCache L1 (20Gi in /dev/shm) is cgroup-charged to lmcache-server,
          # NOT here — so main does not need to budget for it. ResourceQuota
          # charges limits.memory; 40Gi leaves headroom while freeing quota.
          memory: 40Gi
          nvidia.com/gpu: 1
          nvidia.com/gpumem: "90k"
        requests:
          cpu: "4"
          memory: 16Gi
          nvidia.com/gpu: 1
          nvidia.com/gpumem: "90k"
    - image: harbor.phison.com/ai-mw/mw:501-0007.002-vuc
      imagePullPolicy: IfNotPresent
      name: lmcache-server
      command:
      - /bin/bash
      - -lc
      args:
      - |
        set -euo pipefail
        ulimit -l unlimited || true
        exec /usr/local/bin/start-lmcache.sh
      ports:
      - containerPort: 5757
        name: lmcache-zmq
        protocol: TCP
      - containerPort: 8088
        name: lmcache-http
        protocol: TCP
      env:
      - name: POD_IP
        valueFrom:
          fieldRef:
            apiVersion: v1
            fieldPath: status.podIP
      # port values mirror the CLI --port / --http-port flags for any library-level
      # observability that still reads these env vars.
      - name: PYTHONHASHSEED
        value: '0'
      - name: LMCACHE_PORT
        value: '5757'
      - name: LMCACHE_HTTP_PORT
        value: '8088'
      - name: LMCACHE_CHUNK_SIZE
        value: '32'
      - name: LMCACHE_HASH_ALGORITHM
        value: sha256_cbor
      - name: LMCACHE_L1_SIZE_GB
        value: '20'
      - name: LMCACHE_EVICTION_POLICY
        value: LRU
      - name: LMCACHE_L2_STORE_POLICY
        value: default
      - name: LMCACHE_NUM_WORKERS
        value: '16'
      - name: LMCACHE_FS_BASE_PATH
        value: /mnt/nvme0
      - name: LMCACHE_FS_NUM_WORKERS
        value: '32'
      - name: LMCACHE_FS_READ_AHEAD_SIZE
        value: '4096'
      - name: LMCACHE_FS_USE_ODIRECT
        value: 'false'
      - name: LMCACHE_LOG_LEVEL
        value: INFO
      - name: LIBRARY_PATH
        value: /usr/lib/x86_64-linux-gnu:/usr/local/cuda-13.0/compat:/usr/local/cuda/compat
      - name: PROMETHEUS_MULTIPROC_DIR
        value: /tmp/lmcache_prometheus
      # L1 cache lives in /dev/shm (emptyDir medium:Memory) which counts against this
      # container's memory cgroup. limit must exceed L1 size (20Gi) + process
      # overhead — 28Gi keeps ~8Gi headroom above the 20Gi L1.
      resources:
        requests:
          cpu: '1'
          memory: 8Gi
          phison.com/ai100: 1
        limits:
          cpu: '4'
          memory: 28Gi
          phison.com/ai100: 1
      securityContext:
        runAsNonRoot: false
      startupProbe:
        tcpSocket:
          port: 5757
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 30
      livenessProbe:
        tcpSocket:
          port: 5757
        periodSeconds: 15
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /metrics
          port: lmcache-http
          scheme: HTTP
        periodSeconds: 15
        timeoutSeconds: 5
        failureThreshold: 3
      volumeMounts:
      - mountPath: /dev/shm
        name: host-dev-shm
      - mountPath: /tmp/lmcache_prometheus
        name: lmcache-prometheus
      - mountPath: /data/kv-l2
        name: local-disk
    terminationGracePeriodSeconds: 30
    volumes:
    - name: local-disk
      persistentVolumeClaim:
        claimName: gptoss-20b-mw-local-disk-pvc
    - name: host-dev-shm
      emptyDir:
        medium: Memory
        sizeLimit: 24Gi
    # KServe presets inject emptyDir volume "model-cache"; use a distinct name for PVC.
    - name: lmcache-prometheus
      emptyDir: {}
    - name: tls-certs
      secret:
        secretName: '{{ ChildName .ObjectMeta.Name `-kserve-self-signed-certs` }}'
  router:
    route: {}
    gateway: {}
    scheduler:
      pool:
        spec:
          endpointPickerRef:
            failureMode: FailOpen
            kind: Service
            name: '{{ ChildName .ObjectMeta.Name `-epp-service` }}'
            port:
              number: 9002
          selector:
            matchLabels:
              app.kubernetes.io/part-of: llminferenceservice
          targetPorts:
          - number: 8000
      template:
        serviceAccountName: gptoss-20b-mw-epp-sa
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: node-role.phison.mw/gpu
                  operator: In
                  values:
                  - "true"
        containers:
        - name: main
          ports:
          - containerPort: 9002
            name: grpc
            protocol: TCP
          - containerPort: 9003
            name: grpc-health
            protocol: TCP
          - containerPort: 9090
            name: metrics
            protocol: TCP
          - containerPort: 5557
            # KServe's LLMInferenceService controller expects this port name.
            name: zmq
            protocol: TCP
          image: harbor.phison.com/ai-mw/llm-d-router-endpoint-picker:501-0007.001
          imagePullPolicy: IfNotPresent
          startupProbe:
            failureThreshold: 60
            grpc:
              port: 9003
              service: envoy.service.ext_proc.v3.ExternalProcessor
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          livenessProbe:
            failureThreshold: 3
            grpc:
              port: 9003
              service: envoy.service.ext_proc.v3.ExternalProcessor
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 3
            grpc:
              port: 9003
              service: envoy.service.ext_proc.v3.ExternalProcessor
            initialDelaySeconds: 30
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          args:
          # Pool name matches controller-created InferencePool (inference-pool suffix).
          # All replicas are under the base LLMIS so the auto-created pool covers them.
          - --pool-name
          - '{{ ChildName .ObjectMeta.Name `-inference-pool` }}'
          - --pool-namespace
          - '{{ .ObjectMeta.Namespace }}'
          - --zap-encoder
          - json
          - --grpc-port
          - "9002"
          - --grpc-health-port
          - "9003"
          - --config-file
          - /etc/config/endpoint-picker-config.yaml
          # KServe v0.17 skips cert-hash restart when scheduler supports reload.
          - --enable-cert-reload
          - --v
          - "4"
          resources:
            requests:
              cpu: 256m
              memory: 500Mi
          volumeMounts:
          - mountPath: /etc/config
            name: endpoint-picker-config
            readOnly: true
        volumes:
        - name: endpoint-picker-config
          configMap:
            name: gptoss-20b-mw-endpoint-picker-config
        dnsPolicy: ClusterFirst
        restartPolicy: Always
        terminationGracePeriodSeconds: 30