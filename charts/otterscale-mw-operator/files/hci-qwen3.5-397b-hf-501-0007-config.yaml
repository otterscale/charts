
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceServiceConfig
metadata:
  name: qwen35-397b-mw-llmis-config
  annotations:
    phison-mw.ai/served-model-name: "qwen35-397b-mw"
    phison-mw.ai/epp-block-size: "2096"
    phison-mw.ai/render-model-cache-size: "260Gi"
    phison-mw.ai/render-trust-remote-code: "true"
spec:
  replicas: 1
  model:
    name: Qwen35-397B-A17B-NVFP4
    uri: hf://nvidia/Qwen3.5-397B-A17B-NVFP4
  storageInitializer:
    enabled: true
  template:
    serviceAccountName: default
    runtimeClassName: nvidia
    schedulerName: hami-scheduler
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: node-role.phison.mw/gpu
              operator: In
              values:
              - "true"
    containers:
    - image: harbor.phison.com/ai-mw/mw:501-0007.002
      imagePullPolicy: IfNotPresent
      name: main
      ports:
      - containerPort: 8000
        name: vllm
        protocol: TCP
      command:
      - vllm
      - serve
      - /mnt/models
      args:
      - --served-model-name
      - 'qwen35-397b-mw'
      - --max-model-len
      - '262144'
      - --port
      - '8000'
      # qwen3.5-397b is MoE — use expert parallel (official NVFP4 recipe), not PP.
      - --tensor-parallel-size
      - '4'
      - --enable-expert-parallel
      - --language-model-only
      - --reasoning-parser
      - qwen3
      - --trust-remote-code
      - --enable-prefix-caching
      # Mamba/GDN hybrid model: align mode is mandatory; snapshots GDN state at block boundaries.
      - --mamba-cache-mode
      - align
      # Mamba-hybrid + LMCache: block_size <= max-num-batched-tokens < 2*block_size.
      # vLLM forces attention block_size=2096 (mamba page size, TP=4; confirmed in
      # startup log "Setting attention block size to 2096 tokens"); cannot override via
      # --block-size. 4191 is the largest value < 2*2096 (=4192) for max prefill batching.
      - --max-num-batched-tokens
      - '4191'
      - --enable-chunked-prefill
      - --max-cudagraph-capture-size
      - '256'
      - --gpu-memory-utilization=0.85
      - --limit-mm-per-prompt
      - '{"image":0,"audio":0,"video":0}'
      - --disable-uvicorn-access-log
      - --prefix-caching-hash-algo
      - sha256_cbor
      - --disable-custom-all-reduce
      - --mm-encoder-tp-mode
      - data
      - --mm-processor-cache-type
      - shm
      - --limit-mm-per-prompt
      - '{"image":1,"video":0,"audio":0}'
      - --kv-cache-dtype
      - fp8
      - --max-num-seqs
      - '64'
      - --async-scheduling
      - --no-enforce-eager
      - --model-loader-extra-config
      - '{"enable_multithread_load":true,"num_threads":32}'
      - --tool-call-parser
      - qwen3_xml
      - --enable-auto-tool-choice
      - --default-chat-template-kwargs
      - '{"enable_thinking":false}'
      - --uvicorn-log-level
      - 'info'

      - --kv-events-config
      - '{"enable_kv_cache_events":true,"publisher":"zmq","endpoint":"tcp://*:5557","topic":"kv@$(POD_IP):8000@qwen35-397b-mw"}'
      # LMCache v0.4.7+: LMCacheMPConnector implements SupportsHMA, so vLLM keeps HMA
      # enabled automatically. No --no-disable-hybrid-kv-cache-manager needed.
      # In-pod lmcache-server sidecar at localhost:5757 (chunk_size=2096 = vLLM block_size).
      - --kv-transfer-config
      - '{"kv_connector":"LMCacheMPConnector","kv_role":"kv_both","kv_connector_extra_config":{"lmcache.mp.host":"tcp://127.0.0.1","lmcache.mp.port":5757}}'
      env:
      - name: SERVED_MODEL_NAME
        value: "qwen35-397b-mw"
      - name: VLLM_LOGGING_LEVEL
        value: INFO
      - name: FLASHINFER_DISABLE_VERSION_CHECK
        value: '1'
      - name: CUDA_DISABLE_CONTROL
        value: 'true'
      - name: NCCL_CUMEM_HOST_ENABLE
        value: '0'
      - name: LMCACHE_LOG_LEVEL
        value: INFO
      - name: LIBRARY_PATH
        value: /usr/lib/x86_64-linux-gnu:/usr/local/cuda-13.0/compat:/usr/local/cuda/compat
      - name: LMCACHE_USE_EXPERIMENTAL
        value: 'True'
      - name: PYTHONHASHSEED
        value: '0'
      - name: PROMETHEUS_MULTIPROC_DIR
        value: /tmp/lmcache_prometheus
      - name: POD_IP
        valueFrom:
          fieldRef:
            apiVersion: v1
            fieldPath: status.podIP
      - name: HOST_IP
        valueFrom:
          fieldRef:
            apiVersion: v1
            fieldPath: status.hostIP
      securityContext:
        runAsNonRoot: false
      livenessProbe:
        httpGet:
          path: /health
          port: vllm
          scheme: HTTP
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /v1/models
          port: vllm
          scheme: HTTP
        periodSeconds: 30
        timeoutSeconds: 2
        failureThreshold: 3
      startupProbe:
        httpGet:
          path: /v1/models
          port: vllm
          scheme: HTTP
        initialDelaySeconds: 60
        periodSeconds: 15
        timeoutSeconds: 5
        failureThreshold: 80
      volumeMounts:
      - mountPath: /dev/shm
        name: host-dev-shm
      - mountPath: /tmp/lmcache_prometheus
        name: lmcache-prometheus
      - mountPath: /etc/ssl/certs
        name: tls-certs
        readOnly: true
      resources:
        limits:
          cpu: "8"
          memory: 128Gi
          nvidia.com/gpu: 4
          nvidia.com/gpumem: "90k"
        requests:
          cpu: "4"
          memory: 32Gi
          nvidia.com/gpu: 4
          nvidia.com/gpumem: "90k"
    - image: harbor.phison.com/ai-mw/mw:501-0007.002-vuc
      imagePullPolicy: IfNotPresent
      name: lmcache-server
      command:
      - /bin/bash
      - -lc
      args:
      - |
        set -euo pipefail
        ulimit -l unlimited || true
        exec /usr/local/bin/start-lmcache.sh
      ports:
      - containerPort: 5757
        name: lmcache-zmq
        protocol: TCP
      - containerPort: 8088
        name: lmcache-http
        protocol: TCP
      env:
      - name: POD_IP
        valueFrom:
          fieldRef:
            apiVersion: v1
            fieldPath: status.podIP
      # port values mirror the CLI --port / --http-port flags for any library-level
      # observability that still reads these env vars.
      - name: PYTHONHASHSEED
        value: '0'
      - name: LMCACHE_PORT
        value: '5757'
      - name: LMCACHE_HTTP_PORT
        value: '8088'
      - name: LMCACHE_CHUNK_SIZE
        value: '2096'
      - name: LMCACHE_HASH_ALGORITHM
        value: sha256_cbor
      - name: LMCACHE_L1_SIZE_GB
        value: '196'
      - name: LMCACHE_EVICTION_POLICY
        value: LRU
      - name: LMCACHE_L2_STORE_POLICY
        value: default
      - name: LMCACHE_NUM_WORKERS
        value: '16'
      - name: LMCACHE_FS_BASE_PATH
        value: /mnt/nvme0
      - name: LMCACHE_FS_NUM_WORKERS
        value: '32'
      - name: LMCACHE_FS_READ_AHEAD_SIZE
        value: '4096'
      - name: LMCACHE_FS_USE_ODIRECT
        value: 'false'
      - name: LMCACHE_LOG_LEVEL
        value: INFO
      - name: LMCACHE_USE_EXPERIMENTAL
        value: 'True'
      - name: LIBRARY_PATH
        value: /usr/lib/x86_64-linux-gnu:/usr/local/cuda-13.0/compat:/usr/local/cuda/compat
      - name: PROMETHEUS_MULTIPROC_DIR
        value: /tmp/lmcache_prometheus
      # L1 cache lives in /dev/shm (emptyDir medium:Memory) which counts against this
      # container's memory cgroup. limit must exceed L1 size (196Gi) + process overhead.
      # Right-sized from 270Gi (L1 256Gi) to free ~70Gi of the u7sr7s
      # workspace-resource-quota (512Gi). Overhead margin above L1 is ~4Gi.
      resources:
        requests:
          cpu: '1'
          memory: 8Gi
          phison.com/ai100: 1
        limits:
          cpu: '4'
          memory: 200Gi
          phison.com/ai100: 1
      securityContext:
        runAsNonRoot: false
      startupProbe:
        tcpSocket:
          port: 5757
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 30
      livenessProbe:
        tcpSocket:
          port: 5757
        periodSeconds: 15
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /metrics
          port: lmcache-http
          scheme: HTTP
        periodSeconds: 15
        timeoutSeconds: 5
        failureThreshold: 3
      volumeMounts:
      - mountPath: /dev/shm
        name: host-dev-shm
      - mountPath: /tmp/lmcache_prometheus
        name: lmcache-prometheus
      - mountPath: /data/kv-l2
        name: local-disk
    terminationGracePeriodSeconds: 30
    volumes:
    - name: local-disk
      persistentVolumeClaim:
        claimName: qwen35-397b-mw-local-disk-pvc
    - name: host-dev-shm
      emptyDir:
        medium: Memory
        sizeLimit: 210Gi
    # KServe presets inject emptyDir volume "model-cache"; use a distinct name for PVC.
    - name: lmcache-prometheus
      emptyDir: {}
    - name: tls-certs
      secret:
        secretName: '{{ ChildName .ObjectMeta.Name `-kserve-self-signed-certs` }}'
  router:
    route: {}
    gateway: {}
    scheduler:
      pool:
        spec:
          endpointPickerRef:
            failureMode: FailOpen
            kind: Service
            name: '{{ ChildName .ObjectMeta.Name `-epp-service` }}'
            port:
              number: 9002
          selector:
            matchLabels:
              app.kubernetes.io/part-of: llminferenceservice
          targetPorts:
          - number: 8000
      template:
        serviceAccountName: qwen35-397b-mw-epp-sa
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: node-role.phison.mw/gpu
                  operator: In
                  values:
                  - "true"
        containers:
        - name: main
          ports:
          - containerPort: 9002
            name: grpc
            protocol: TCP
          - containerPort: 9003
            name: grpc-health
            protocol: TCP
          - containerPort: 9090
            name: metrics
            protocol: TCP
          - containerPort: 5557
            # KServe's LLMInferenceService controller expects this port name.
            name: zmq
            protocol: TCP
          image: harbor.phison.com/ai-mw/llm-d-router-endpoint-picker:501-0007.001
          imagePullPolicy: IfNotPresent
          startupProbe:
            failureThreshold: 60
            grpc:
              port: 9003
              service: envoy.service.ext_proc.v3.ExternalProcessor
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          livenessProbe:
            failureThreshold: 3
            grpc:
              port: 9003
              service: envoy.service.ext_proc.v3.ExternalProcessor
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 3
            grpc:
              port: 9003
              service: envoy.service.ext_proc.v3.ExternalProcessor
            initialDelaySeconds: 30
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          args:
          # Pool name matches controller-created InferencePool (inference-pool suffix).
          # All replicas are under the base LLMIS so the auto-created pool covers them.
          - --pool-name
          - '{{ ChildName .ObjectMeta.Name `-inference-pool` }}'
          - --pool-namespace
          - '{{ .ObjectMeta.Namespace }}'
          - --zap-encoder
          - json
          - --grpc-port
          - "9002"
          - --grpc-health-port
          - "9003"
          - --config-file
          - /etc/config/endpoint-picker-config.yaml
          # KServe v0.17 skips cert-hash restart when scheduler supports reload.
          - --enable-cert-reload
          - --v
          - "4"
          resources:
            requests:
              cpu: 256m
              memory: 500Mi
          volumeMounts:
          - mountPath: /etc/config
            name: endpoint-picker-config
            readOnly: true
        volumes:
        - name: endpoint-picker-config
          configMap:
            name: qwen35-397b-mw-endpoint-picker-config
        dnsPolicy: ClusterFirst
        restartPolicy: Always
        terminationGracePeriodSeconds: 30