  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: license-operator
    control-plane: controller-manager
  name: license-operator-system
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: license-operator
  name: clusterfingerprints.license.otterscale.io
spec:
  group: license.otterscale.io
  names:
    kind: ClusterFingerprint
    listKind: ClusterFingerprintList
    plural: clusterfingerprints
    shortNames:
    - cf
    singular: clusterfingerprint
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.clusterFingerprint
      name: Fingerprint
      type: string
    - jsonPath: .status.collectedAt
      name: CollectedAt
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            properties:
              exportRequest:
                description: |
                  Triggers a new .lreq collection when set to true. The Operator resets this field to false after completing the export.
                type: boolean
            type: object
          status:
            properties:
              clusterFingerprint:
                description: SHA256(kube-system UID), prefixed with "sha256:".
                type: string
              collectedAt:
                description: Timestamp of the last successful fingerprint collection.
                format: date-time
                type: string
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      maxLength: 1024
                      minLength: 1
                      type: string
                    status:
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      maxLength: 316
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              kubeSystemUID:
                description: Raw UID of the kube-system namespace.
                type: string
              lreqB64:
                description: Base64-encoded .lreq document, populated after a successful
                  export.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: license-operator
  name: licenses.license.otterscale.io
spec:
  group: license.otterscale.io
  names:
    kind: License
    listKind: LicenseList
    plural: licenses
    shortNames:
    - lic
    singular: license
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.clusterFingerprintOK
      name: ClusterOK
      type: boolean
    - jsonPath: .status.nodeCount
      name: Nodes
      type: integer
    - jsonPath: .status.authorizedNodeCount
      name: Authorized
      type: integer
    - jsonPath: .status.maxNodes
      name: MaxNodes
      type: integer
    - jsonPath: .status.bindingRefreshedAt
      name: BindingRefreshed
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            properties:
              authorizedNodes:
                description: Optional admin override pinning which nodes are authorized.
                items:
                  type: string
                type: array
              token:
                description: Raw JWT content of the .lic file delivered by the licensing
                  system.
                type: string
            type: object
          status:
            properties:
              authorizedNodeCount:
                description: Number of currently authorized nodes.
                type: integer
              bindingRefreshedAt:
                description: Timestamp of the last successful binding.jwt refresh.
                format: date-time
                type: string
              clusterFingerprintOK:
                description: Whether the JWT cluster_fingerprint matches this cluster.
                type: boolean
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      maxLength: 1024
                      minLength: 1
                      type: string
                    status:
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      maxLength: 316
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              gpuQuota:
                description: Per-model GPU quota utilization.
                items:
                  properties:
                    authorizedCards:
                      type: integer
                    maxCards:
                      type: integer
                    modelID:
                      type: string
                  type: object
                type: array
              lastAcceptedAuthorizedNodes:
                description: Most recent spec.authorizedNodes that passed validation;
                  used as fallback when a new override is rejected.
                items:
                  type: string
                type: array
              maxNodes:
                description: Maximum number of nodes allowed by the license (0 = unlimited).
                type: integer
              nodeAuthorizations:
                description: Per-node authorization result.
                items:
                  properties:
                    authorized:
                      type: boolean
                    createdAt:
                      type: string
                    gpus:
                      items:
                        properties:
                          count:
                            type: integer
                          modelID:
                            type: string
                          pciDeviceID:
                            type: string
                        type: object
                      type: array
                    name:
                      type: string
                    reason:
                      type: string
                  type: object
                type: array
              nodeCount:
                description: Total number of nodes currently in the cluster.
                type: integer
              phase:
                description: Overall authorization state of this license.
                enum:
                - Pending
                - Provisional
                - Active
                - Expired
                - Invalid
                type: string
              selectionMode:
                description: How the authorized set was selected; one of "fifo", "admin_override",
                  "last_accepted_override".
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
