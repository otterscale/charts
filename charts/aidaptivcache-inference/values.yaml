image:
  repository: docker.io/library/aidaptiv
  tag: vNXUN_3_03_AA
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Model image volume (OCI image as volume - requires Kubernetes 1.31+ with ImageVolume feature gate)
# Uncomment and enable when your cluster supports ImageVolume (Kubernetes 1.31+).
modelImage:
  enabled: false
  reference: "docker.io/library/llama3.1-8b-instruct:latest"
  pullPolicy: IfNotPresent
  mountPath: /data/model

# Init container: copies model from the model image into a shared emptyDir volume.
# Build your model image with a shell (e.g., FROM busybox), then set the image reference here.
initContainer:
  enabled: true
  image:
    repository: docker.io/library/llama3.1-8b-instruct
    tag: latest
    pullPolicy: IfNotPresent
  modelSourcePath: /model
  sharedDataPath: /data

deployment:
  replicas: 1

vllm:
  env:
    vllmUseV1: "1"
    vllmWorkerMultiprocMethod: "spawn"
    # tiktokenEncodingsBase: "https://example.com/encodings/"

  args:
    model: /data/model/
    nvmePath: /mnt/nvme0
    gpuMemoryUtilization: 0.9
    maxModelLen: 8192
    tensorParallelSize: 1
    dramKVOffloadGb: 0
    ssdKVOffloadGb: 500
    noResumeKVCache: true
    disableGpuReuse: true
    enableChunkedPrefill: true
    # disableLongToken: true
    # resumeKVCache: true
    # cleanObsoleteKVCache: true
    # enablePrefixCaching: true
    # enforceEager: true
    # disableKVCache: true

  lora:
    enable: false
    modules: ""
    maxRank: 32

  # Seconds to sleep before starting vLLM (0 = disabled)
  waiting: 36000

service:
  type: NodePort
  port: 8000
  targetPort: 8000
  # nodePort: 30299

volumes:
  dshm:
    enabled: true
    sizeLimit: 16Gi
  pvc:
    enabled: false
    claimName: ""
    mountPath: /mnt/data
    readOnly: false

# Extra commands to run in initContainer after model copy (requires initContainer.enabled: true)
prescript: ""

resources: {}
#resources:
