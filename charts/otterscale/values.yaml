# Global naming overrides
nameOverride: ""
fullnameOverride: ""

# -----------------------------------------------------------------------------
# Storage Configuration
# -----------------------------------------------------------------------------
storage:
  localPath:
    # When enabled, the chart deploys rancher/local-path-provisioner and
    # creates a dedicated StorageClass.  PostgreSQL will automatically use
    # this StorageClass — no need to set keycloakx.database.persistence.storageClassName.
    enabled: false
    # Absolute host path used for volume storage.  Must exist on every node
    # (or be created automatically via the setup script in the ConfigMap).
    path: /opt/otterscale/storage
    # Name given to the created StorageClass.
    storageClassName: otterscale-local-path
    # Set true to make this the cluster default StorageClass.
    isDefault: false
    # ReclaimPolicy: Retain (safe default) or Delete.
    reclaimPolicy: Retain
    image:
      repository: rancher/local-path-provisioner
      tag: v0.0.28
      pullPolicy: IfNotPresent

# -----------------------------------------------------------------------------
# OtterScale Service Configuration
# -----------------------------------------------------------------------------
otterscaleApi:
  image:
    repository: ghcr.io/otterscale/otterscale
    tag: ""
    pullPolicy: IfNotPresent
  # Container listen ports (must match the application's listen addresses).
  ports:
    http: 8299
    tunnel: 8300
  # NodePort for external access; drives OTTERSCALE_SERVER_EXTERNAL_*_URL.
  nodePorts:
    http: 30299
    tunnel: 30300
  env: []

otterscaleDashboard:
  image:
    repository: ghcr.io/otterscale/dashboard
    tag: ""
    pullPolicy: IfNotPresent
  # Container listen port.
  ports:
    http: 3000
  env: []

# -----------------------------------------------------------------------------
# Service Mesh Configuration
# -----------------------------------------------------------------------------
istio:
  enabled: true
  externalIP: ""
  sidecarInjection:
    enabled: true
  virtualService:
    enabled: true

  # TLS configuration for Istio Gateway
  tls:
    # Enable TLS for the gateway
    enabled: false
    # Name of an existing Secret containing tls.crt and tls.key.
    # You are responsible for creating and managing this Secret.
    existingSecret: ""

  # Gateway configuration for external traffic
  gateway:
    enabled: true
    # If set, use this existing Gateway instead of creating a new one.
    # Supports "<name>" (same namespace) or "<namespace>/<name>" format.
    # When set, the chart will NOT create a Gateway resource.
    existingGateway: ""
    hosts:
      - "*"

# -----------------------------------------------------------------------------
# Valkey Configuration (for otterscale-web)
# -----------------------------------------------------------------------------
valkey:
  enabled: true
  aclUsers:
    default:
      permissions: "~* &* +@all"
  password: ""

# -----------------------------------------------------------------------------
# Keycloak Configuration
# -----------------------------------------------------------------------------
keycloakx:
  enabled: true
  auth:
    adminPassword: ""
  client:
    id: otterscale
    secret: ""
  http:
    relativePath: /auth/

  command:
  - /bin/sh
  - -c
  - |
    /opt/keycloak/bin/kc.sh start \
    --verbose \
    --import-realm \
    --http-port=8080 \
    --http-enabled=true \
    --hostname-strict=false \
    --spi-events-listener-jboss-logging-success-level=info \
    --spi-events-listener-jboss-logging-error-level=warn

  extraEnvFrom: |
    - configMapRef:
        # Computed by parent chart as <fullname>-keycloak-env.
        # Update if using a custom fullnameOverride.
        name: otterscale-keycloak-env
    - secretRef:
        # Computed by parent chart as <fullname>-keycloak-admin.
        # Update if using a custom fullnameOverride.
        name: otterscale-keycloak-admin

  dbchecker:
    enabled: true
  database:
    vendor: postgres
    database: keycloak
    username: keycloak
    existingSecret: keycloak-postgres
    existingSecretKey: "postgres-password"
    hostname: keycloak-postgres
    port: 5432
    image:
      repository: postgres
      tag: "18"
      pullPolicy: IfNotPresent
    persistence:
      enabled: true
      storageClassName: ""
      accessMode: ReadWriteOnce
      size: 5Gi

  extraInitContainers: |
    - name: theme-provider
      image: ghcr.io/otterscale/keycloakify:1.2.1
      imagePullPolicy: IfNotPresent
      command:
        - sh
      args:
        - -c
        - |
          echo "Copying OtterScale theme..."
          cp -R /otterscale-theme.jar /otterscale-theme
          echo "$(ls -alh /otterscale-theme)"
      volumeMounts:
        - name: theme-import-volume
          mountPath: /otterscale-theme

  extraVolumeMounts: |
    - name: realm-import-volume
      mountPath: "/opt/keycloak/data/import/otterscale-realm.json"
      subPath: "otterscale-realm.json"
      readOnly: true
    - name: theme-import-volume
      mountPath: "/opt/keycloak/providers/otterscale-theme.jar"
      subPath: "otterscale-theme.jar"
      readOnly: true

  extraVolumes: |
    - name: realm-import-volume
      secret:
        # This name is computed by the parent chart as <fullname>-realm.
        # If you customise fullnameOverride, update this value to match.
        secretName: {{ .Values.realmSecretName }}
    - name: theme-import-volume
      emptyDir: {}
  # Computed realm secret name injected via tpl in keycloakx extraVolumes.
  # Override this only when using a custom fullnameOverride.
  realmSecretName: "otterscale-realm"

# -----------------------------------------------------------------------------
# Harbor Configuration (Container Registry)
# -----------------------------------------------------------------------------
# Harbor is exposed via NodePort (HTTP 32180) — no Istio routing needed.
# Docker push/pull:
#   docker login <externalIP>:32180
#
# harbor.externalURL must match the actual browser URL (scheme://IP:nodePort).
# -----------------------------------------------------------------------------
harbor:
  enabled: false
  # Base URL for Harbor as seen from the browser.
  # IMPORTANT: Must match the actual browser URL scheme and port.
  # If set to https:// but accessed via http://, CSRF cookies will be rejected.
  externalURL: "http://127.0.0.1:32180"

  # Harbor admin password (change after first login)
  harborAdminPassword: "Harbor12345"

  # Expose via NodePort — accessed directly without Istio
  expose:
    type: nodePort
    tls:
      enabled: false
    nodePort:
      name: harbor
      ports:
        http:
          port: 80
          nodePort: 32180

  ipFamily:
    ipv6:
      enabled: false

  # Persistence
  persistence:
    enabled: true
    persistentVolumeClaim:
      registry:
        storageClass: "microk8s-hostpath"
        size: 50Gi
      database:
        storageClass: "microk8s-hostpath"
        size: 5Gi
      jobservice:
        jobLog:
          storageClass: "microk8s-hostpath"
          size: 1Gi
      redis:
        storageClass: "microk8s-hostpath"
        size: 1Gi
      trivy:
        storageClass: "microk8s-hostpath"
        size: 5Gi

  # Internal PostgreSQL & Redis
  database:
    type: internal
  redis:
    type: internal

  # ---------------------------------------------------------
  # OIDC integration with Keycloak (custom values for parent chart)
  # These are NOT native Harbor chart values; they are used by
  # the harbor-oidc-job template to auto-configure OIDC via API.
  # ---------------------------------------------------------
  oidc:
    enabled: true
    # Harbor shares the 'otterscale' Keycloak client (no separate client needed)
    scope: "openid,profile,email"
    autoOnboard: true
    groupsClaim: "groups"
    adminGroup: "harbor_admins"