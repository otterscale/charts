# OtterScale chart values.
# Top-level keys (server, dashboard, storage, ingress, envoy) drive this chart's
# own templates; keycloakx, dashboard-valkey and harbor are passed through to
# their respective subcharts.

# ── Global ──
global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: "otterscale-local-path"

# Namespace for all chart resources (pass --namespace to match).
namespace: "otterscale-system"
nameOverride: ""
fullnameOverride: ""

# ── Enterprise Edition ──
# When enabled, the dashboard image switches to its "-ee" variant.
ee:
  enabled: false

# ── Storage ──
# localPath.enabled deploys rancher/local-path-provisioner + a StorageClass.
storage:
  localPath:
    enabled: false
    path: /opt/otterscale/storage
    storageClassName: otterscale-local-path
    reclaimPolicy: Retain  # Retain or Delete
    image:
      repository: rancher/local-path-provisioner
      tag: v0.0.28
      pullPolicy: IfNotPresent
    helperPod:
      # Only needs a POSIX shell to run `mkdir -m 0777` / `rm -rf` (see
      # templates/storage/provisioner.yaml) — any minimal shell image works.
      image:
        repository: docker.io/library/debian
        tag: bookworm-slim
        pullPolicy: IfNotPresent

# ── OtterScale Server ──
server:
  # Advertised endpoints. Empty = auto-derive from dashboard.externalURL
  # (+ nodePort if set).
  externalURL: ""
  externalTunnelURL: ""

  replicaCount: 1  # ignored when autoscaling.enabled
  image:
    repository: ghcr.io/otterscale/otterscale
    # renovate: image=ghcr.io/otterscale/otterscale
    tag: "v1.3.0-rc.3"
    pullPolicy: IfNotPresent
  ports:
    http: 8299
    tunnel: 8300

  serviceAccount:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: true

  revisionHistoryLimit: 3
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%

  service:  # type: ClusterIP | NodePort | LoadBalancer
    type: ClusterIP
    nodePort: ""
    annotations: {}
    labels: {}
  tunnelService:
    type: ClusterIP
    nodePort: ""
    annotations: {}
    labels: {}

  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:  # CPU limit omitted by default to avoid throttling
      memory: "1024Mi"

  livenessProbe:
    enabled: true
    tcpSocket:
      port: http
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    enabled: true
    tcpSocket:
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  startupProbe:
    enabled: false
    tcpSocket:
      port: http
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 30

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    behavior: {}
  pdb:
    create: false
    minAvailable: 1
  networkPolicy:
    enabled: false
    ingress: []
    egress: []
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    metricRelabelings: []
    relabelings: []

  # Scheduling
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  priorityClassName: ""
  terminationGracePeriodSeconds: 30

  # Pod extras / escape hatches
  podAnnotations: {}
  podLabels: {}
  env: []
  extraEnvFrom: []
  extraVolumes: []
  extraVolumeMounts: []
  extraContainers: []
  initContainers: []

# ── OtterScale Dashboard ──
dashboard:
  # Base external URL used to build external-facing URLs (Keycloak realm URL,
  # CORS origins, server external URL, …). Required.
  externalURL: ""

  replicaCount: 1  # ignored when autoscaling.enabled
  image:
    repository: ghcr.io/otterscale/dashboard
    # renovate: image=ghcr.io/otterscale/dashboard
    tag: "v1.3.0-rc.7"
    pullPolicy: IfNotPresent
  ports:
    http: 3000

  serviceAccount:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: false

  revisionHistoryLimit: 3
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%

  service:  # type: ClusterIP | NodePort | LoadBalancer
    type: ClusterIP
    annotations: {}
    labels: {}

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:  # CPU limit omitted by default to avoid throttling
      memory: "1024Mi"

  livenessProbe:
    enabled: true
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    enabled: true
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  startupProbe:
    enabled: false
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 30

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    behavior: {}
  pdb:
    create: false
    minAvailable: 1
  networkPolicy:
    enabled: false
    ingress: []
    egress: []
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    metricRelabelings: []
    relabelings: []

  # Scheduling
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  priorityClassName: ""
  terminationGracePeriodSeconds: 30

  # Pod extras / escape hatches
  podAnnotations: {}
  podLabels: {}
  env: []
  extraEnvFrom: []
  extraVolumes: []
  extraVolumeMounts: []
  extraContainers: []
  initContainers: []

# ── Ingress (standard K8s Ingress; alternative to Envoy Gateway) ──
ingress:
  enabled: false
  className: ""
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
  hosts:
    - host: otterscale.local
      paths:
        - path: /
          pathType: Prefix
          service: dashboard
        - path: /api/
          pathType: Prefix
          service: server
          rewrite: true
        - path: /auth/
          pathType: Prefix
          service: keycloak
  tls: []

# ── Envoy Gateway (Gateway API) ──
envoy:
  enabled: false
  # GatewayClass backed by the Envoy Gateway controller (envoy-gateway-system).
  gatewayClassName: "envoy-otterscale"
  httpRoute:
    enabled: true
    hostnames: []  # empty = derive from dashboard.externalURL host
  # TLS: enabled=true -> HTTPS (supply crt+key OR existingSecret).
  #      enabled=false -> HTTP only via ip:port (no HTTPS listener / redirect /
  #                       per-domain Harbor route).
  tls:
    enabled: false
    # crt+key (raw PEM): chart creates "<fullname>-tls" Secret in the Gateway ns.
    crt: ""
    key: ""
    # OR an existing Secret — it MUST already exist in the Gateway namespace.
    existingSecret: ""
    redirectToHTTPS: true
  gateway:
    create: true
    name: "otterscale-gateway"
    # Gateway / EnvoyProxy / chart-managed TLS Secret all live here (co-located
    # so the HTTPS listener references the Secret without a ReferenceGrant).
    namespace: "envoy-gateway-system"
    # Envoy data-plane Service fronting the Gateway.
    service:
      type: NodePort  # NodePort (ip:port) | LoadBalancer (domain)
      # NodePorts used only when type is NodePort; omitted for LoadBalancer.
      httpNodePort: 30080
      httpsNodePort: 30443
      # Used only when type is LoadBalancer and a controller honours it (MetalLB).
      loadBalancerIP: ""

# ── Valkey (dashboard session cache) ──
dashboard-valkey:
  enabled: true
  port: 6379
  podLabels: {}
  aclUsers:
    default:
      permissions: "~* &* +@all"
  password: ""

# ── Keycloak (codecentric keycloakx subchart) ──
keycloakx:
  enabled: true
  nameOverride: keycloak
  podLabels: {}
  realm: otterscale
  auth:
    adminUser: admin
    adminPassword: ""
  clients:
    # The server also uses the dashboard client id to validate tokens.
    dashboard:
      id: otterscale-dashboard
      secret: ""
    harbor:
      id: otterscale-harbor
      secret: ""
  http:
    relativePath: /auth/
  service:
    port: 80

  command:
    - /bin/sh
    - -c
    - |
      /opt/keycloak/bin/kc.sh start \
      --import-realm \
      --http-port=8080 \
      --http-enabled=true \
      --proxy-headers=xforwarded \
      --spi-events-listener-jboss-logging-success-level=info \
      --spi-events-listener-jboss-logging-error-level=warn

  # NOTE: extraEnvFrom/extraVolumes are tpl-evaluated by the keycloakx subchart
  # in ITS OWN context — use .Release.Name, not "otterscale.fullname".
  extraEnvFrom: |
    - configMapRef:
        name: {{ .Release.Name }}-{{ default "keycloakx" .Values.nameOverride }}-env
    - secretRef:
        name: {{ .Release.Name }}-{{ default "keycloakx" .Values.nameOverride }}-admin

  # The subchart's built-in dbchecker init container defaults to busybox
  # (docker.io/busybox) and shells out to `nc`. Disabled here in favor of a
  # custom initContainer below that reuses the postgres image already pulled
  # for the database itself and checks readiness with `pg_isready`.
  dbchecker:
    enabled: false
  database:
    vendor: postgres
    database: keycloak
    username: keycloak
    # Must match the resources created by keycloak/postgres-*.yaml templates
    # (these values are NOT tpl-evaluated by the subchart).
    existingSecret: otterscale-keycloak-postgres
    existingSecretKey: "postgres-password"
    hostname: otterscale-keycloak-postgres
    port: 5432
    image:
      repository: postgres
      tag: "15"
      pullPolicy: IfNotPresent
    persistence:
      enabled: true
      storageClassName: "otterscale-local-path"
      accessMode: ReadWriteOnce
      size: 5Gi
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  extraInitContainers: |
    - name: dbchecker
      image: {{ .Values.database.image.repository }}:{{ .Values.database.image.tag }}
      imagePullPolicy: {{ .Values.database.image.pullPolicy }}
      command:
        - sh
        - -c
        - |
          echo "Waiting for Database to become ready..."
          until pg_isready -h {{ .Values.database.hostname }} -p {{ .Values.database.port }}; do
            sleep 2
          done
          echo "Database OK"
    - name: theme-provider
      image: ghcr.io/otterscale/keycloakify:1.2.7
      imagePullPolicy: IfNotPresent
      command:
        - sh
      args:
        - -c
        - |
          echo "Copying OtterScale theme..."
          cp -R /otterscale-theme.jar /otterscale-theme
          echo "$(ls -alh /otterscale-theme)"
      volumeMounts:
        - name: theme-import-volume
          mountPath: /otterscale-theme

  extraVolumeMounts: |
    - name: realm-import-volume
      mountPath: "/opt/keycloak/data/import/otterscale-realm.json"
      subPath: "otterscale-realm.json"
      readOnly: true
    - name: theme-import-volume
      mountPath: "/opt/keycloak/providers/otterscale-theme.jar"
      subPath: "otterscale-theme.jar"
      readOnly: true

  extraVolumes: |
    - name: realm-import-volume
      secret:
        secretName: {{ .Release.Name }}-otterscale-realm
    - name: theme-import-volume
      emptyDir: {}

# ── Harbor (container registry) ──
# externalURL must match the browser URL (scheme://host:nodePort).
harbor:
  enabled: true
  externalURL: "http://127.0.0.1:32180"
  harborAdminPassword: ""
  # Chart creates this Secret; Harbor references it by name (literal, not tpl).
  existingSecretAdminPassword: "otterscale-harbor-admin"
  existingSecretAdminPasswordKey: "HARBOR_ADMIN_PASSWORD"

  core:
    extraEnvVars:
      - name: CONFIG_OVERWRITE_JSON
        valueFrom:
          secretKeyRef:
            name: "otterscale-harbor-oidc-config"  # must match harbor.oidc.configSecretName
            key: CONFIG_OVERWRITE_JSON

  expose:
    type: nodePort
    tls:
      enabled: false
    nodePort:
      name: harbor
      ports:
        http:
          port: 80
          nodePort: 32180

  ipFamily:
    ipv6:
      enabled: false

  persistence:
    enabled: true
    persistentVolumeClaim:
      registry:
        storageClass: "otterscale-local-path"
        size: 50Gi
      database:
        storageClass: "otterscale-local-path"
        size: 5Gi
      jobservice:
        jobLog:
          storageClass: "otterscale-local-path"
          size: 1Gi
      redis:
        storageClass: "otterscale-local-path"
        size: 1Gi
      trivy:
        storageClass: "otterscale-local-path"
        size: 5Gi

  database:
    type: internal
  redis:
    type: internal

  oidc:
    enabled: true
    scope: "openid,profile,email"
    autoOnboard: true
    groupsClaim: "groups"
    adminGroup: "harbor_admin"
    # Must match the name referenced in harbor.core.extraEnvVars.
    configSecretName: "otterscale-harbor-oidc-config"

# Post-install hook that pre-creates Harbor projects once Harbor is ready.
# Runs as a post-install/post-upgrade Helm hook; each API call is idempotent
# (an already-existing project is treated as success).
harborInit:
  enabled: true
  # Projects to create. public: "true" makes the project publicly readable.
  projects:
    - name: "modules"
      public: "true"
    - name: "models"
      public: "true"
  image:
    repository: docker.io/library/debian
    tag: "bookworm-slim"
    pullPolicy: IfNotPresent
  # Seconds to keep waiting for the Harbor API to become healthy before failing.
  waitTimeoutSeconds: 600
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi
