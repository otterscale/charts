# =============================================================================
# Global Configuration
# =============================================================================
global:
  # -- Override the image registry for all images in this chart.
  imageRegistry: ""
  # -- Global image pull secrets.
  # E.g. imagePullSecrets: [{ name: "my-registry-secret" }]
  imagePullSecrets: []
  # -- Global default StorageClass for all PVCs.
  storageClass: "otterscale-local-path"

# -- Override the namespace for all resources.
# Defaults to "otterscale-system". When installing with helm, pass
# --namespace otterscale-system --create-namespace to match.
namespace: "otterscale-system"

# -- Override the chart name used in resource names.
nameOverride: ""
# -- Override the full resource name prefix.
fullnameOverride: ""

# =============================================================================
# Storage Configuration
# =============================================================================
storage:
  localPath:
    # -- When enabled, the chart deploys rancher/local-path-provisioner and
    # creates a dedicated StorageClass.  PostgreSQL will automatically use
    # this StorageClass.
    enabled: false
    # -- Absolute host path used for volume storage.
    path: /opt/otterscale/storage
    # -- Name given to the created StorageClass.
    storageClassName: otterscale-local-path
    # -- ReclaimPolicy: Retain (safe default) or Delete.
    reclaimPolicy: Retain
    image:
      repository: rancher/local-path-provisioner
      tag: v0.0.28
      pullPolicy: IfNotPresent
    helperPod:
      image:
        repository: busybox
        tag: "1.32"
        pullPolicy: IfNotPresent

# =============================================================================
# OtterScale Server Configuration
# =============================================================================
server:
  # -- Override the external URL the server advertises to clients (API endpoint).
  # When empty, auto-derived from externalURL (+ nodePort if configured).
  # E.g. "https://otterscale.example.com", "http://192.168.1.100:30080"
  externalURL: ""
  # -- Override the external tunnel URL the server advertises to agents.
  # When empty, auto-derived from externalURL (+ nodePort if configured).
  # E.g. "https://otterscale.example.com:8300", "https://192.168.1.100:30300"
  externalTunnelURL: ""

  # -- Number of replicas. Ignored when autoscaling.enabled is true.
  replicaCount: 1

  image:
    repository: ghcr.io/otterscale/otterscale
    # renovate: image=ghcr.io/otterscale/otterscale
    tag: "v1.0.5"
    pullPolicy: IfNotPresent

  # -- Container ports.
  ports:
    http: 8299
    tunnel: 8300

  # -- ServiceAccount configuration.
  serviceAccount:
    # -- Create a dedicated ServiceAccount.
    create: true
    # -- Override the ServiceAccount name. Defaults to server fullname.
    name: ""
    # -- Annotations added to the ServiceAccount.
    annotations: {}
    # -- Automount API credentials into pods.
    automountServiceAccountToken: true

  # -- Deployment revision history limit (number of old ReplicaSets to retain).
  revisionHistoryLimit: 3

  # -- Deployment update strategy.
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%

  # -- HTTP service configuration.
  service:
    # -- Kubernetes Service type: ClusterIP, NodePort, or LoadBalancer.
    type: ClusterIP
    # -- NodePort value (only used when type is NodePort).
    nodePort: ""
    # -- Annotations added to the Service.
    annotations: {}
    # -- Extra labels added to the Service.
    labels: {}

  # -- Tunnel service configuration.
  tunnelService:
    # -- Kubernetes Service type: ClusterIP, NodePort, or LoadBalancer.
    type: ClusterIP
    # -- NodePort value (only used when type is NodePort).
    nodePort: ""
    # -- Annotations added to the Service.
    annotations: {}
    # -- Extra labels added to the Service.
    labels: {}

  # -- Resource requests and limits.
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      # -- CPU limit omitted by default to avoid throttling.
      # cpu: "1"
      memory: "1024Mi"

  # -- Liveness probe configuration.
  livenessProbe:
    enabled: true
    tcpSocket:
      port: http
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3

  # -- Readiness probe configuration.
  readinessProbe:
    enabled: true
    tcpSocket:
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  # -- Startup probe configuration (disabled by default).
  startupProbe:
    enabled: false
    tcpSocket:
      port: http
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 30

  # -- Pod-level security context.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault

  # -- Container-level security context.
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true

  # -- Horizontal Pod Autoscaler configuration.
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80
    # -- HPA scaling behavior.
    behavior: {}

  # -- PodDisruptionBudget configuration.
  pdb:
    create: false
    # -- Minimum number of pods available during disruptions.
    minAvailable: 1
    # maxUnavailable: ""

  # -- NetworkPolicy configuration.
  networkPolicy:
    enabled: false
    # -- Additional custom ingress rules.
    ingress: []
    # -- Additional custom egress rules.
    egress: []

  # -- Prometheus ServiceMonitor configuration.
  serviceMonitor:
    enabled: false
    # -- Override the namespace for the ServiceMonitor.
    namespace: ""
    # -- Scrape interval.
    interval: 30s
    # -- Scrape timeout.
    scrapeTimeout: 10s
    # -- Additional labels for the ServiceMonitor.
    labels: {}
    # -- Metric relabeling configs.
    metricRelabelings: []
    # -- Relabeling configs.
    relabelings: []

  # -- Node selector for pod assignment.
  nodeSelector: {}
  # -- Tolerations for pod assignment.
  tolerations: []
  # -- Affinity rules for pod assignment.
  affinity: {}
  # -- Topology spread constraints for pod assignment.
  topologySpreadConstraints: []
  # -- Priority class name for pod scheduling.
  priorityClassName: ""
  # -- Termination grace period in seconds (K8s default is 30s).
  # Increase if tunnel connections need more time for graceful drain.
  terminationGracePeriodSeconds: 30

  # -- Extra annotations added to pods.
  podAnnotations: {}
  # -- Extra labels added to pods.
  podLabels: {}

  # -- Additional environment variables.
  env: []
  # -- Additional environment variable sources (configMapRef, secretRef).
  extraEnvFrom: []
  # -- Additional volumes.
  extraVolumes: []
  # -- Additional volume mounts.
  extraVolumeMounts: []
  # -- Additional sidecar containers.
  extraContainers: []
  # -- Init containers.
  initContainers: []

# =============================================================================
# OtterScale Dashboard Configuration
# =============================================================================
dashboard:
  # -- Base external URL used to construct external-facing URLs
  # (Keycloak realm URL, CORS allowed origins, server external URL, etc.).
  # Required regardless of whether Istio or Ingress is enabled.
  # E.g. "http://192.168.1.100", "https://otterscale.example.com"
  externalURL: ""

  # -- Number of replicas. Ignored when autoscaling.enabled is true.
  replicaCount: 1

  image:
    repository: ghcr.io/otterscale/dashboard
    # renovate: image=ghcr.io/otterscale/dashboard
    tag: "v1.0.8"
    pullPolicy: IfNotPresent

  # -- Container ports.
  ports:
    http: 3000

  # -- ServiceAccount configuration.
  serviceAccount:
    # -- Create a dedicated ServiceAccount.
    create: true
    # -- Override the ServiceAccount name. Defaults to dashboard fullname.
    name: ""
    # -- Annotations added to the ServiceAccount.
    annotations: {}
    # -- Automount API credentials into pods.
    automountServiceAccountToken: false

  # -- Deployment revision history limit (number of old ReplicaSets to retain).
  revisionHistoryLimit: 3

  # -- Deployment update strategy.
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%

  # -- Service configuration.
  service:
    # -- Kubernetes Service type: ClusterIP, NodePort, or LoadBalancer.
    type: ClusterIP
    # -- Annotations added to the Service.
    annotations: {}
    # -- Extra labels added to the Service.
    labels: {}

  # -- Resource requests and limits.
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      # -- CPU limit omitted by default to avoid throttling.
      # cpu: "500m"
      memory: "1024Mi"

  # -- Liveness probe configuration.
  livenessProbe:
    enabled: true
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3

  # -- Readiness probe configuration.
  readinessProbe:
    enabled: true
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  # -- Startup probe configuration (disabled by default).
  startupProbe:
    enabled: false
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 30

  # -- Pod-level security context.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault

  # -- Container-level security context.
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  # -- Horizontal Pod Autoscaler configuration.
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80
    behavior: {}

  # -- PodDisruptionBudget configuration.
  pdb:
    create: false
    minAvailable: 1

  # -- NetworkPolicy configuration.
  networkPolicy:
    enabled: false
    ingress: []
    egress: []

  # -- Prometheus ServiceMonitor configuration.
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    metricRelabelings: []
    relabelings: []

  # -- Node selector for pod assignment.
  nodeSelector: {}
  # -- Tolerations for pod assignment.
  tolerations: []
  # -- Affinity rules for pod assignment.
  affinity: {}
  # -- Topology spread constraints for pod assignment.
  topologySpreadConstraints: []
  # -- Priority class name for pod scheduling.
  priorityClassName: ""
  # -- Termination grace period in seconds.
  terminationGracePeriodSeconds: 30

  # -- Extra annotations added to pods.
  podAnnotations: {}
  # -- Extra labels added to pods.
  podLabels: {}

  # -- Additional environment variables.
  env: []
  # -- Additional environment variable sources.
  extraEnvFrom: []
  # -- Additional volumes.
  extraVolumes: []
  # -- Additional volume mounts.
  extraVolumeMounts: []
  # -- Additional sidecar containers.
  extraContainers: []
  # -- Init containers.
  initContainers: []

# =============================================================================
# Ingress Configuration (standard Kubernetes Ingress)
# =============================================================================
ingress:
  # -- Enable standard Kubernetes Ingress. Typically used as an alternative to Istio.
  enabled: false
  # -- IngressClass name (e.g. "nginx", "traefik").
  className: ""
  # -- Annotations added to the Ingress resource.
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
  # -- Ingress host rules.
  hosts:
    - host: otterscale.local
      paths:
        - path: /
          pathType: Prefix
          service: dashboard
        - path: /api/
          pathType: Prefix
          service: server
          rewrite: true
        - path: /auth/
          pathType: Prefix
          service: keycloak
  # -- TLS configuration for the Ingress.
  tls: []
  #  - secretName: otterscale-tls
  #    hosts:
  #      - otterscale.local

# =============================================================================
# Service Mesh Configuration (Istio)
# =============================================================================
istio:
  # -- Enable Istio integration (Gateway API).
  enabled: false
  sidecarInjection:
    # -- Inject Istio sidecar into pods.
    enabled: true
  httpRoute:
    # -- Create a Gateway API HTTPRoute.
    enabled: true
    # -- Hostnames for the HTTPRoute. Must be a subset of the Gateway listener hostnames.
    # Leave empty to match all hostnames.
    hostnames: []

  # TLS configuration for Gateway.
  tls:
    # -- Enable TLS termination at the Gateway.
    enabled: false
    # -- Name of an existing Secret containing tls.crt and tls.key.
    # Required when istio.tls.enabled is true.
    existingSecret: ""

  # Reference to an existing Gateway API Gateway resource.
  gateway:
    # -- Name of the Gateway resource that HTTPRoute should attach to.
    name: "gateway"
    # -- Namespace of the Gateway resource.
    namespace: "istio-ingress"

# =============================================================================
# Valkey Configuration (Dashboard session cache)
# =============================================================================
dashboard-valkey:
  enabled: true
  # -- Valkey service port.
  port: 6379
  # -- Pod labels for the Valkey deployment.
  # When using Istio with sidecar injection, add:
  #   sidecar.istio.io/inject: "true"
  podLabels: {}
  aclUsers:
    default:
      permissions: "~* &* +@all"
  password: ""

# =============================================================================
# Keycloak Configuration
# =============================================================================
keycloakx:
  enabled: true
  nameOverride: keycloak
  # -- Pod labels for the Keycloak StatefulSet.
  # When using Istio with sidecar injection, add:
  #   sidecar.istio.io/inject: "true"
  podLabels: {}
  # -- Keycloak realm name.
  realm: otterscale
  auth:
    # -- Keycloak bootstrap admin username.
    adminUser: admin
    adminPassword: ""
  clients:
    dashboard:
      # -- Keycloak client ID for the dashboard (authorization code + PKCE flow).
      # The server also uses this client ID to validate tokens.
      id: otterscale-dashboard
      secret: ""
    harbor:
      # -- Keycloak client ID for Harbor OIDC integration.
      id: otterscale-harbor
      secret: ""
  http:
    relativePath: /auth/
  # -- Keycloak HTTP service port (as exposed by the codecentric chart).
  service:
    port: 80

  command:
    - /bin/sh
    - -c
    - |
      /opt/keycloak/bin/kc.sh start \
      --import-realm \
      --http-port=8080 \
      --http-enabled=true \
      --hostname-strict=false \
      --spi-events-listener-jboss-logging-success-level=info \
      --spi-events-listener-jboss-logging-error-level=warn

  # NOTE: extraEnvFrom and extraVolumes are tpl-evaluated by the keycloakx
  # subchart in ITS OWN context. Use .Release.Name (shared across parent
  # and subchart) rather than "otterscale.fullname" (which resolves
  # differently in subchart context).
  extraEnvFrom: |
    - configMapRef:
        name: {{ .Release.Name }}-{{ default "keycloakx" .Values.nameOverride }}-env
    - secretRef:
        name: {{ .Release.Name }}-{{ default "keycloakx" .Values.nameOverride }}-admin

  dbchecker:
    enabled: true
  database:
    vendor: postgres
    database: keycloak
    username: keycloak
    # -- Name of the Secret and headless Service for PostgreSQL.
    # Must match the resources created by keycloak/postgres-*.yaml templates.
    # These values are NOT tpl-evaluated by the keycloakx subchart.
    existingSecret: otterscale-keycloak-postgres
    existingSecretKey: "postgres-password"
    hostname: otterscale-keycloak-postgres
    port: 5432
    image:
      repository: postgres
      tag: "15"
      pullPolicy: IfNotPresent
    persistence:
      enabled: true
      storageClassName: ""
      accessMode: ReadWriteOnce
      size: 5Gi
    # -- Resource requests and limits for the Keycloak PostgreSQL container.
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  extraInitContainers: |
    - name: theme-provider
      image: ghcr.io/otterscale/keycloakify:1.2.2
      imagePullPolicy: IfNotPresent
      command:
        - sh
      args:
        - -c
        - |
          echo "Copying OtterScale theme..."
          cp -R /otterscale-theme.jar /otterscale-theme
          echo "$(ls -alh /otterscale-theme)"
      volumeMounts:
        - name: theme-import-volume
          mountPath: /otterscale-theme

  extraVolumeMounts: |
    - name: realm-import-volume
      mountPath: "/opt/keycloak/data/import/otterscale-realm.json"
      subPath: "otterscale-realm.json"
      readOnly: true
    - name: theme-import-volume
      mountPath: "/opt/keycloak/providers/otterscale-theme.jar"
      subPath: "otterscale-theme.jar"
      readOnly: true

  extraVolumes: |
    - name: realm-import-volume
      secret:
        secretName: {{ .Release.Name }}-otterscale-realm
    - name: theme-import-volume
      emptyDir: {}

# =============================================================================
# Harbor Configuration (Container Registry)
# =============================================================================
# Harbor is exposed via NodePort (HTTP 32180).
# Docker push/pull:  docker login <host>:32180
# harbor.externalURL must match the actual browser URL (scheme://IP:nodePort).
harbor:
  enabled: true
  externalURL: "http://127.0.0.1:32180"
  harborAdminPassword: ""
  # -- Name of the Secret storing Harbor admin password.
  # The chart creates this Secret; Harbor subchart references it by name.
  # Harbor does NOT tpl-evaluate this value, so it must be a literal string.
  existingSecretAdminPassword: "otterscale-harbor-admin"
  existingSecretAdminPasswordKey: "HARBOR_ADMIN_PASSWORD"

  core:
    extraEnvVars:
      - name: CONFIG_OVERWRITE_JSON
        valueFrom:
          secretKeyRef:
            # Must match harbor.oidc.configSecretName
            name: "otterscale-harbor-oidc-config"
            key: CONFIG_OVERWRITE_JSON

  expose:
    type: nodePort
    tls:
      enabled: false
    nodePort:
      name: harbor
      ports:
        http:
          port: 80
          nodePort: 32180

  ipFamily:
    ipv6:
      enabled: false

  persistence:
    enabled: true
    persistentVolumeClaim:
      registry:
        storageClass: "otterscale-local-path"
        size: 50Gi
      database:
        storageClass: "otterscale-local-path"
        size: 5Gi
      jobservice:
        jobLog:
          storageClass: "otterscale-local-path"
          size: 1Gi
      redis:
        storageClass: "otterscale-local-path"
        size: 1Gi
      trivy:
        storageClass: "otterscale-local-path"
        size: 5Gi

  database:
    type: internal

  redis:
    type: internal

  oidc:
    enabled: true
    scope: "openid,profile,email"
    autoOnboard: true
    groupsClaim: "groups"
    adminGroup: "harbor_admin"
    # -- Name of the Secret containing Harbor OIDC config JSON.
    # Must match the name referenced in harbor.core.extraEnvVars.
    configSecretName: "otterscale-harbor-oidc-config"
