# OtterScale chart values. server/dashboard/storage/envoy drive this chart's
# templates; keycloakx, dashboard-valkey and harbor pass through to subcharts.
# "INTERNAL WIRING" blocks are chart-managed — do not edit.
# resources: {} = chart defaults (defined in the component's template).

# ── Global ──
global:
  imageRegistry: ""
  imagePullSecrets: []
  nodeSelector: {}

# Namespace for all chart resources (pass --namespace to match).
namespace: "otterscale-system"
nameOverride: ""
fullnameOverride: ""

# ── Enterprise Edition ──
# When enabled, the dashboard image switches to its "-ee" variant.
ee:
  enabled: false

# ── Storage ──
# localPath.enabled deploys rancher/local-path-provisioner + a StorageClass.
storage:
  localPath:
    enabled: false
    path: /opt/otterscale/storage
    storageClassName: otterscale-local-path
    reclaimPolicy: Retain # Retain or Delete
    image:
      repository: rancher/local-path-provisioner
      tag: v0.0.36
      pullPolicy: IfNotPresent
    helperPod:
      # Any minimal image with a POSIX shell works.
      image:
        repository: docker.io/library/debian
        tag: bookworm-slim
        pullPolicy: IfNotPresent

# ── OtterScale Server ──
server:
  # Empty = derive from dashboard.externalURL.
  externalURL: ""
  externalTunnelURL: ""

  replicaCount: 1 # ignored when autoscaling.enabled
  image:
    repository: ghcr.io/otterscale/otterscale
    # renovate: image=ghcr.io/otterscale/otterscale
    tag: "v1.3.0"
    pullPolicy: IfNotPresent
  ports:
    http: 8299
    tunnel: 8300

  serviceAccount:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: true

  revisionHistoryLimit: 3
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%

  service: # type: ClusterIP | NodePort | LoadBalancer
    type: ClusterIP
    annotations: {}
    labels: {}
  tunnelService:
    type: ClusterIP
    nodePort: ""
    annotations: {}
    labels: {}

  resources: {}

  livenessProbe:
    enabled: true
    tcpSocket:
      port: http
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    enabled: true
    tcpSocket:
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  startupProbe:
    enabled: false
    tcpSocket:
      port: http
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 30

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    behavior: {}
  pdb:
    create: false
    minAvailable: 1
  networkPolicy:
    enabled: false
    ingress: []
    egress: []
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    metricRelabelings: []
    relabelings: []

  # Scheduling
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  priorityClassName: ""
  terminationGracePeriodSeconds: 30

  # Pod extras / escape hatches
  podAnnotations: {}
  podLabels: {}
  env: []
  extraEnvFrom: []
  extraVolumes: []
  extraVolumeMounts: []
  extraContainers: []
  initContainers: []

# ── OtterScale Dashboard ──
dashboard:
  # Browser-facing base URL (drives Keycloak realm URL, CORS, redirects). Required.
  externalURL: ""

  replicaCount: 1 # ignored when autoscaling.enabled
  image:
    repository: ghcr.io/otterscale/dashboard
    # renovate: image=ghcr.io/otterscale/dashboard
    tag: "v1.3.3"
    pullPolicy: IfNotPresent
  ports:
    http: 3000

  serviceAccount:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: false

  revisionHistoryLimit: 3
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%

  service: # type: ClusterIP | NodePort | LoadBalancer
    type: ClusterIP
    annotations: {}
    labels: {}

  resources: {}

  livenessProbe:
    enabled: true
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    enabled: true
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  startupProbe:
    enabled: false
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 30

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    behavior: {}
  pdb:
    create: false
    minAvailable: 1
  networkPolicy:
    enabled: false
    ingress: []
    egress: []
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    metricRelabelings: []
    relabelings: []

  # Scheduling
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  priorityClassName: ""
  terminationGracePeriodSeconds: 30

  # Pod extras / escape hatches
  podAnnotations: {}
  podLabels: {}
  env: []
  extraEnvFrom: []
  extraVolumes: []
  extraVolumeMounts: []
  extraContainers: []
  initContainers: []

# ── Envoy Gateway (Gateway API) ──
envoy:
  enabled: false
  # GatewayClass backed by the Envoy Gateway controller (envoy-gateway-system).
  gatewayClassName: "envoy-otterscale"
  httpRoute:
    hostnames: [] # empty = derive from dashboard.externalURL host
  # TLS on: supply crt+key (raw PEM) OR existingSecret (must already exist in
  # the Gateway namespace). TLS off: HTTP only via ip:port.
  tls:
    enabled: false
    crt: ""
    key: ""
    existingSecret: ""
    redirectToHTTPS: true
  gateway:
    create: true
    name: "otterscale-gateway"
    namespace: "envoy-gateway-system"
    service:
      type: NodePort # NodePort (ip:port) | LoadBalancer (domain)
      httpNodePort: 30080
      httpsNodePort: 30443
      loadBalancerIP: "" # LoadBalancer only (e.g. MetalLB)

# ── Valkey (dashboard session cache) ──
dashboard-valkey:
  enabled: true
  port: 6379
  podLabels: {}
  aclUsers:
    default:
      permissions: "~* &* +@all"
  password: ""

# ── Keycloak (codecentric keycloakx subchart) ──
keycloakx:
  enabled: true
  nameOverride: keycloak
  podLabels: {}
  realm: otterscale
  auth:
    adminUser: admin
    adminPassword: ""
  clients:
    # The server also uses the dashboard client id to validate tokens.
    dashboard:
      id: otterscale-dashboard
      secret: ""
    harbor:
      id: otterscale-harbor
      secret: ""
  http:
    relativePath: /auth/
  service:
    port: 80

  # ── INTERNAL WIRING (do not edit; from here to end of keycloakx block) ──
  # Ties the subchart to this chart's templates; strings are tpl'd in the
  # SUBCHART context. Tunable exceptions: database.persistence / .resources.
  command:
    - /bin/sh
    - -c
    - |
      /opt/keycloak/bin/kc.sh start \
      --import-realm \
      --http-port=8080 \
      --http-enabled=true \
      --proxy-headers=xforwarded \
      --spi-events-listener-jboss-logging-success-level=info \
      --spi-events-listener-jboss-logging-error-level=warn

  extraEnvFrom: |
    - configMapRef:
        name: {{ .Release.Name }}-{{ default "keycloakx" .Values.nameOverride }}-env
    - secretRef:
        name: {{ .Release.Name }}-{{ default "keycloakx" .Values.nameOverride }}-admin

  dbchecker:
    enabled: false
  database:
    vendor: postgres
    database: keycloak
    username: keycloak
    # Must match keycloak/postgres-*.yaml (not tpl-evaluated by the subchart).
    existingSecret: otterscale-keycloak-postgres
    existingSecretKey: "postgres-password"
    hostname: otterscale-keycloak-postgres
    port: 5432
    image:
      repository: postgres
      tag: "18"
      pullPolicy: IfNotPresent
    persistence:
      enabled: true
      storageClassName: "otterscale-local-path"
      accessMode: ReadWriteOnce
      size: 5Gi
    resources: {}

  extraInitContainers: |
    - name: dbchecker
      image: {{ .Values.database.image.repository }}:{{ .Values.database.image.tag }}
      imagePullPolicy: {{ .Values.database.image.pullPolicy }}
      command:
        - sh
        - -c
        - |
          echo "Waiting for Database to become ready..."
          until pg_isready -h {{ .Values.database.hostname }} -p {{ .Values.database.port }}; do
            sleep 2
          done
          echo "Database OK"
    - name: theme-provider
      image: ghcr.io/otterscale/keycloakify:1.2.7
      imagePullPolicy: IfNotPresent
      command:
        - sh
      args:
        - -c
        - |
          echo "Copying OtterScale theme..."
          cp -R /otterscale-theme.jar /otterscale-theme
          echo "$(ls -alh /otterscale-theme)"
      volumeMounts:
        - name: theme-import-volume
          mountPath: /otterscale-theme

  extraVolumeMounts: |
    - name: realm-import-volume
      mountPath: "/opt/keycloak/data/import/otterscale-realm.json"
      subPath: "otterscale-realm.json"
      readOnly: true
    - name: theme-import-volume
      mountPath: "/opt/keycloak/providers/otterscale-theme.jar"
      subPath: "otterscale-theme.jar"
      readOnly: true

  extraVolumes: |
    - name: realm-import-volume
      secret:
        secretName: {{ .Release.Name }}-realm
    - name: theme-import-volume
      emptyDir: {}

# ── Keycloak init/sync hooks ──
# Propagate dashboard.externalURL / harbor.externalURL changes into the live
# realm (--import-realm only seeds it once) and restart Keycloak when the
# OIDC issuer (KC_HOSTNAME) changes.
keycloakInit:
  enabled: true
  image:
    # Empty = keycloakx subchart image (kcadm matches server version).
    repository: ""
    tag: ""
    pullPolicy: IfNotPresent
  waitTimeoutSeconds: 600
  resources: {}

  envRefresh:
    enabled: true
    image:
      repository: docker.io/curlimages/curl
      tag: "8.14.1"
      pullPolicy: IfNotPresent
    resources: {}

# ── Harbor (container registry) ──
# externalURL must match the browser URL (scheme://host:nodePort).
harbor:
  enabled: true
  externalURL: "http://127.0.0.1:32180"
  harborAdminPassword: ""
  # INTERNAL WIRING (do not edit): Secret created by harbor/admin-secret.yaml.
  existingSecretAdminPassword: "otterscale-harbor-admin"
  existingSecretAdminPasswordKey: "HARBOR_ADMIN_PASSWORD"

  nginx:
    image:
      tag: v2.15.2

  portal:
    image:
      tag: v2.15.2

  core:
    image:
      tag: v2.15.2
    # INTERNAL WIRING (do not edit): name must match harbor.oidc.configSecretName.
    extraEnvVars:
      - name: CONFIG_OVERWRITE_JSON
        valueFrom:
          secretKeyRef:
            name: "otterscale-harbor-oidc-config"
            key: CONFIG_OVERWRITE_JSON

  jobservice:
    image:
      tag: v2.15.2

  registry:
    registry:
      image:
        tag: v2.15.2
    controller:
      image:
        tag: v2.15.2

  trivy:
    image:
      tag: v2.15.2

  expose:
    type: nodePort
    tls:
      enabled: false
    nodePort:
      name: harbor
      ports:
        http:
          port: 80
          nodePort: 32180

  ipFamily:
    ipv6:
      enabled: false

  persistence:
    enabled: true
    persistentVolumeClaim:
      registry:
        storageClass: "otterscale-local-path"
        size: 50Gi
      database:
        storageClass: "otterscale-local-path"
        size: 5Gi
      jobservice:
        jobLog:
          storageClass: "otterscale-local-path"
          size: 1Gi
      redis:
        storageClass: "otterscale-local-path"
        size: 1Gi
      trivy:
        storageClass: "otterscale-local-path"
        size: 5Gi

  database:
    internal:
      image:
        tag: v2.15.2

  redis:
    internal:
      image:
        repository: docker.io/goharbor/valkey-photon
        tag: v2.15.2

  exporter:
    image:
      tag: v2.15.2

  oidc:
    enabled: true
    scope: "openid,profile,email"
    autoOnboard: true
    groupsClaim: "groups"
    adminGroup: "harbor_admin"
    # Must match the name referenced in harbor.core.extraEnvVars.
    configSecretName: "otterscale-harbor-oidc-config"

# ── Harbor init hook ──
# Pre-creates Harbor projects once Harbor is ready (idempotent).
harborInit:
  enabled: true
  projects:
    - name: "modules"
      public: "true"
    - name: "models"
      public: "true"
    - name: "operator"
      public: "true"
  image:
    repository: docker.io/library/debian
    tag: "bookworm-slim"
    pullPolicy: IfNotPresent
  waitTimeoutSeconds: 600
  resources: {}
