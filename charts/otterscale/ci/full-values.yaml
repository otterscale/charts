# CI test: all optional features enabled.
# Used by: helm lint, helm template, chart-testing (ct lint)

global:
  imageRegistry: "registry.example.com"
  imagePullSecrets:
    - name: regcred

envoy:
  enabled: true
  gateway:
    name: gateway
    namespace: envoy-gateway-system
  tls:
    enabled: true
    existingSecret: otterscale-tls

longhorn:
  enabled: true

server:
  replicaCount: 2
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::role/otterscale"
  service:
    type: NodePort
  tunnelService:
    type: NodePort
    nodePort: "30300"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 75
  pdb:
    create: true
    minAvailable: 1
  networkPolicy:
    enabled: true
  serviceMonitor:
    enabled: true
    interval: 15s
    labels:
      release: prometheus
  resources:
    requests:
      cpu: "1"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "2Gi"
  nodeSelector:
    kubernetes.io/os: linux
  tolerations:
    - key: "dedicated"
      operator: "Equal"
      value: "otterscale"
      effect: "NoSchedule"
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: backend

dashboard:
  externalURL: "https://10.0.0.1"
  replicaCount: 2
  serviceAccount:
    create: true
  service:
    type: ClusterIP
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 80
  pdb:
    create: true
    minAvailable: 1
  networkPolicy:
    enabled: true
  serviceMonitor:
    enabled: true
    labels:
      release: prometheus

harbor:
  enabled: true
  externalURL: "http://10.0.0.1:32180"
