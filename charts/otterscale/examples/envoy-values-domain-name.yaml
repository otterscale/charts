# Example: Envoy Gateway with TLS + domain names (HTTPS)
#
#   Dashboard : https://otterscale.phison.com
#   Server API: https://otterscale.phison.com/api/
#   Tunnel    : https://otterscale.phison.com:30300
#   Harbor    : https://cr.phison.com
#
# The chart creates the Gateway (HTTP + HTTPS listeners), the Harbor HTTPRoute
# and an HTTP->HTTPS redirect. No manual post-install editing required.
#
# Usage:
#   helm install otterscale -n otterscale-system --create-namespace ./ \
#     -f examples/envoy-values-domain-name.yaml

dashboard:
  externalURL: "https://otterscale.phison.com"

server:
  externalURL: "https://otterscale.phison.com/api/"
  externalTunnelURL: "https://otterscale.phison.com/tunnel/"

harbor:
  externalURL: "https://cr.phison.com"

storage:
  localPath:
    enabled: true

ee:
  enabled: true

envoy:
  enabled: true
  gateway:
    service:
      # 域名情境：用 LoadBalancer（不帶 nodePort）。若無 cloud LB 控制器，
      # 安裝後自行指定 IP：
      #   kubectl patch svc <envoy-svc> -n envoy-gateway-system \
      #     --subresource=status --type=merge \
      #     -p '{"status":{"loadBalancer":{"ingress":[{"ip":"192.168.196.103"}]}}}'
      type: LoadBalancer
  tls:
    enabled: true
    redirectToHTTPS: true

    # ---- 憑證來源（二選一）----

    # 方式 A：引用已存在的 Secret（必須事先建立在 envoy-gateway-system）
    #   kubectl create secret tls phison-new-2026 \
    #     --cert=tls.crt --key=tls.key -n envoy-gateway-system
    existingSecret: "phison-new-2026"

    # 方式 B：直接貼上憑證，由 chart 自動建立 Secret（留空 existingSecret 即用此）
    # crt: |
    #   -----BEGIN CERTIFICATE-----
    #   ...貼上 tls.crt (PEM)...
    #   -----END CERTIFICATE-----
    # key: |
    #   -----BEGIN PRIVATE KEY-----
    #   ...貼上 tls.key (PEM)...
    #   -----END PRIVATE KEY-----
