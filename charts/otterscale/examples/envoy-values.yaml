# Example: Gateway API HTTPRoute with Envoy Gateway
# All services are accessed through a single IP via path-based routing.
#
# Usage:
#   helm install otterscale ./charts/otterscale -f examples/istio-values.yaml

dashboard:
  externalURL: "http://192.168.1.100:30080"

server:
  externalURL: "http://192.168.1.100:30080/api/"
  externalTunnelURL: "http://192.168.1.100:30300"
  tunnelService:
    type: NodePort
    nodePort: "30300"

harbor:
  externalURL: "http://192.168.1.100:32180"

storage:
  localPath:
    enabled: true

envoy:
  enabled: true

ee:
  enabled: true

# Envoy Gateway does not require sidecar injection.
# To attach to a pre-existing Gateway instead, set:
#   envoy.gateway.create: false
#   envoy.gateway.name / envoy.gateway.namespace: <your gateway>
# and ensure that Gateway's listeners allow routes from the otterscale namespace.
