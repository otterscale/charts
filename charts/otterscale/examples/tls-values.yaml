# Example: Envoy Gateway with TLS + two domains (OtterScale + Harbor)
#
# Single helm install — no manual post-install editing of Gateway/HTTPRoute/
# ConfigMaps. The chart creates the Gateway (HTTP + HTTPS listeners), the
# Harbor HTTPRoute, and an HTTP->HTTPS redirect.
#
# Usage:
#   helm install otterscale . -n otterscale-system --create-namespace \
#     -f examples/tls-values.yaml

dashboard:
  externalURL: "https://otterscale.phison.com"

server:
  externalURL: "https://otterscale.phison.com/api/"
  externalTunnelURL: "https://otterscale.phison.com:30300"
  tunnelService:
    type: NodePort
    nodePort: "30300"

harbor:
  externalURL: "https://cr.phison.com"

storage:
  localPath:
    enabled: true

ee:
  enabled: true

envoy:
  enabled: true
  gatewayClassName: "eg"        # the Envoy Gateway GatewayClass name
  gateway:
    create: true
    name: "otterscale"
    namespace: "envoy-gateway-system"   # Gateway + EnvoyProxy + TLS Secret live here
  tls:
    enabled: true
    redirectToHTTPS: true

    # --- Option A: user already has a Secret (e.g. phison-new-2026) ---
    # The Secret MUST live in the Gateway namespace (envoy-gateway-system).
    mode: "existingSecret"
    existingSecret: "phison-new-2026"

    # --- Option B: paste the certificate; the chart creates the Secret ---
    # mode: "provided"
    # provided:
    #   crt: |
    #     -----BEGIN CERTIFICATE-----
    #     ...
    #     -----END CERTIFICATE-----
    #   key: |
    #     -----BEGIN PRIVATE KEY-----
    #     ...
    #     -----END PRIVATE KEY-----

    # --- Option C: no certificate supplied -> cert-manager self-signed ---
    # (requires cert-manager already installed in the cluster)
    # mode: "certManager"
    # certManager:
    #   createSelfSignedIssuer: true
