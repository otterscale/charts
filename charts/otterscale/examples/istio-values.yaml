# Example: Gateway API (Gateway + HTTPRoute) with Istio
# All services are accessed through a single IP via path-based routing.
#
# Usage:
#   helm install otterscale ./charts/otterscale -f examples/istio-values.yaml

dashboard:
  externalURL: "http://192.168.1.100"
  image:
    tag: ""

server:
  externalURL: "http://192.168.1.100/api/"
  externalTunnelURL: "https://192.168.1.100:30300"
  image:
    tag: ""
  tunnelService:
    type: NodePort
    nodePort: "30300"

harbor:
  externalURL: "http://192.168.1.100:32180"

storage:
  localPath:
    enabled: true

istio:
  enabled: true

# Inject Istio sidecar into subchart pods for mTLS.
# Required when PeerAuthentication is set to STRICT.
keycloakx:
  podLabels:
    sidecar.istio.io/inject: "true"

dashboard-valkey:
  podLabels:
    sidecar.istio.io/inject: "true"
