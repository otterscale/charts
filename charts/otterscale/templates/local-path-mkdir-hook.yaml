{{- if .Values.storage.localPath.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "otterscale.fullname" . }}-mkdir
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "otterscale.labels" . | nindent 4 }}
    app.kubernetes.io/component: local-path-mkdir
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "otterscale.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: local-path-mkdir
    spec:
      restartPolicy: OnFailure
      volumes:
        - name: host-storage
          hostPath:
            path: {{ .Values.storage.localPath.path }}
            type: DirectoryOrCreate
      containers:
        - name: mkdir
          image: busybox
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              chmod 0777 /mnt/host-storage
              echo "Directory {{ .Values.storage.localPath.path }} is ready."
          volumeMounts:
            - name: host-storage
              mountPath: /mnt/host-storage
          securityContext:
            # Root is required only for chmod; no other elevated privileges.
            runAsUser: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - DAC_OVERRIDE
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
{{- end }}
