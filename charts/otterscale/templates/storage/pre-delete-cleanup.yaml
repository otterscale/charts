{{- /*
Pre-delete cleanup for Longhorn-backed PVCs.

helm uninstall deletes everything at once, so without ordering the Longhorn
CSI driver disappears before the app PVCs are cleaned up and the release
hangs on pod/PVC finalizers. Pre-delete hooks run synchronously in
hook-weight order BEFORE any release resource is deleted; Longhorn's own
uninstaller job is a pre-delete hook at the default weight 0, so this job
(weight -5) always runs first, while the CSI driver is still alive:

  1. Abort (nothing deleted) unless the Longhorn deleting-confirmation-flag
     setting is "true" — the flag is the user's explicit consent to destroy
     volume data and is never set here.
  2. Delete the PVC consumers (harbor, keycloak, postgres) and wait, so
     kubelet can unmount/detach normally.
  3. Delete every PVC on the "longhorn" StorageClass (including StatefulSet
     volumeClaimTemplates PVCs, which helm never deletes) and wait for the
     Longhorn volumes to be removed.

Bypassed by `helm uninstall --no-hooks` (documented in the README).
*/}}
{{- if and .Values.longhorn.enabled .Values.longhorn.uninstallCleanup.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "otterscale.fullname" . }}-storage-cleanup
  namespace: {{ include "otterscale.namespace" . }}
  labels:
    {{- include "otterscale.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage-cleanup
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "otterscale.fullname" . }}-storage-cleanup
  namespace: {{ include "otterscale.namespace" . }}
  labels:
    {{- include "otterscale.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage-cleanup
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["longhorn.io"]
    resources: ["settings"]
    verbs: ["get"]
  - apiGroups: ["longhorn.io"]
    resources: ["volumes"]
    verbs: ["get", "list", "delete"]
---
{{- /* PVs are cluster-scoped; cleaned here because their external-provisioner
finalizer can only be honored while the CSI provisioner still runs. */}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "otterscale.fullname" . }}-storage-cleanup
  labels:
    {{- include "otterscale.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage-cleanup
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "otterscale.fullname" . }}-storage-cleanup
  labels:
    {{- include "otterscale.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage-cleanup
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "otterscale.fullname" . }}-storage-cleanup
subjects:
  - kind: ServiceAccount
    name: {{ include "otterscale.fullname" . }}-storage-cleanup
    namespace: {{ include "otterscale.namespace" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "otterscale.fullname" . }}-storage-cleanup
  namespace: {{ include "otterscale.namespace" . }}
  labels:
    {{- include "otterscale.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage-cleanup
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "otterscale.fullname" . }}-storage-cleanup
subjects:
  - kind: ServiceAccount
    name: {{ include "otterscale.fullname" . }}-storage-cleanup
    namespace: {{ include "otterscale.namespace" . }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "otterscale.fullname" . }}-storage-cleanup
  namespace: {{ include "otterscale.namespace" . }}
  labels:
    {{- include "otterscale.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage-cleanup
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-5"
    # Failed jobs are kept so the abort message stays readable via kubectl logs.
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  activeDeadlineSeconds: {{ add .Values.longhorn.uninstallCleanup.waitTimeoutSeconds 600 }}
  template:
    metadata:
      labels:
        {{- include "otterscale.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: storage-cleanup
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "otterscale.fullname" . }}-storage-cleanup
      {{- with include "otterscale.podNodeSelector" (dict "context" $) }}
      nodeSelector:
        {{- . | nindent 8 }}
      {{- end }}
      containers:
        - name: storage-cleanup
          image: "{{ .Values.longhorn.uninstallCleanup.image.repository }}:{{ .Values.longhorn.uninstallCleanup.image.tag }}"
          imagePullPolicy: {{ .Values.longhorn.uninstallCleanup.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: NS
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: RELEASE
              value: {{ .Release.Name | quote }}
            - name: WAIT_TIMEOUT
              value: {{ .Values.longhorn.uninstallCleanup.waitTimeoutSeconds | quote }}
          command:
            - sh
            - -eu
            - -c
            - |
              flag="$(kubectl -n "$NS" get settings.longhorn.io deleting-confirmation-flag -o jsonpath='{.value}' 2>/dev/null || echo absent)"
              if [ "$flag" = "absent" ]; then
                echo "Longhorn deleting-confirmation-flag setting not found; nothing to clean up."
                exit 0
              fi
              if [ "$flag" != "true" ]; then
                echo "ERROR: Longhorn deleting-confirmation-flag is not 'true'; aborting uninstall before anything is deleted."
                echo "Uninstalling DESTROYS all data on Longhorn volumes. To confirm, run:"
                echo "  kubectl -n $NS patch settings.longhorn.io deleting-confirmation-flag --type merge -p '{\"value\":\"true\"}'"
                echo "then retry: helm uninstall $RELEASE -n $NS --timeout 15m"
                exit 1
              fi

              # Issue all consumer deletions asynchronously, then watch-wait on
              # the pods (the actual blockers for unmount and pvc-protection).
              # kubectl wait is event-driven: it returns the moment they are
              # gone instead of polling on a fixed interval.
              echo "Tearing down PVC consumers while the Longhorn CSI driver is still running..."
              kubectl -n "$NS" delete deploy,sts -l "app=harbor,release=$RELEASE" \
                --wait=false --ignore-not-found
              kubectl -n "$NS" delete sts -l "app.kubernetes.io/name=keycloak,app.kubernetes.io/instance=$RELEASE" \
                --wait=false --ignore-not-found
              kubectl -n "$NS" delete sts -l "app.kubernetes.io/instance=$RELEASE,app.kubernetes.io/component=database" \
                --wait=false --ignore-not-found

              echo "Waiting for consumer pods to terminate..."
              for sel in \
                "app=harbor,release=$RELEASE" \
                "app.kubernetes.io/name=keycloak,app.kubernetes.io/instance=$RELEASE" \
                "app.kubernetes.io/instance=$RELEASE,app.kubernetes.io/component=database"; do
                kubectl -n "$NS" wait --for=delete pod -l "$sel" --timeout=180s 2>/dev/null \
                  || true # no matching pods (already gone) also lands here
              done

              echo "Deleting PVCs on the longhorn StorageClass..."
              pvcs="$(kubectl -n "$NS" get pvc -o jsonpath='{range .items[?(@.spec.storageClassName=="longhorn")]}{.metadata.name} {end}')"
              if [ -n "$pvcs" ]; then
                # shellcheck disable=SC2086
                kubectl -n "$NS" delete pvc $pvcs --timeout=180s || echo "WARN: some PVCs still terminating"
              else
                echo "No longhorn PVCs found."
              fi

              # With reclaimPolicy Retain, deleting the PVCs leaves the PVs and
              # Longhorn volumes behind by design — remove them explicitly
              # (flag=true above is the user's consent to destroy the data).
              # delete --timeout watches finalizers and returns as soon as the
              # volumes are gone.
              echo "Deleting Longhorn volumes..."
              if kubectl -n "$NS" get volumes.longhorn.io --no-headers 2>/dev/null | grep -q .; then
                kubectl -n "$NS" delete volumes.longhorn.io --all --timeout="${WAIT_TIMEOUT}s" \
                  || echo "WARN: Longhorn volumes still terminating; the Longhorn uninstaller will force-remove them."
              else
                echo "No Longhorn volumes found."
              fi

              # Released longhorn PVs must go while the CSI provisioner can
              # still honor their finalizer; afterwards they are undeletable.
              echo "Deleting leftover longhorn PersistentVolumes..."
              pvs="$(kubectl get pv -o jsonpath='{range .items[?(@.spec.storageClassName=="longhorn")]}{.metadata.name} {end}')"
              if [ -n "$pvs" ]; then
                # shellcheck disable=SC2086
                kubectl delete pv $pvs --timeout=120s || echo "WARN: some PVs still terminating"
              else
                echo "No longhorn PVs found."
              fi
              echo "Storage cleanup done; handing over to the Longhorn uninstaller."
              exit 0
          resources:
            {{- if .Values.longhorn.uninstallCleanup.resources }}
            {{- toYaml .Values.longhorn.uninstallCleanup.resources | nindent 12 }}
            {{- else }}
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
            {{- end }}
{{- end }}
