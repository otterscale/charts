apiVersion: v1
kind: Pod
metadata:
  name: {{ include "otterscale.dashboard.fullname" . }}-test-connection
  namespace: {{ include "otterscale.namespace" . }}
  labels:
    {{- include "otterscale.dashboard.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: wget
      image: busybox:1.36
      command: ['wget']
      args: ['--spider', '--timeout=5', '{{ include "otterscale.dashboard.fullname" . }}:{{ .Values.dashboard.ports.http }}']
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
      resources:
        limits:
          cpu: 50m
          memory: 32Mi
        requests:
          cpu: 10m
          memory: 16Mi
