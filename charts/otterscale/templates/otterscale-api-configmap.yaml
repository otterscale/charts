apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "otterscale.api.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "otterscale.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
data:
  # Listen addresses (injected directly into the container)
  OTTERSCALE_SERVER_ADDRESS: ":{{ .Values.otterscaleApi.ports.http }}"
  OTTERSCALE_SERVER_TUNNEL_ADDRESS: "0.0.0.0:{{ .Values.otterscaleApi.ports.tunnel }}"
  # Keycloak
  OTTERSCALE_SERVER_KEYCLOAK_REALM_URL: "{{ include "otterscale.externalURL" . }}/auth/realms/otterscale"
  OTTERSCALE_SERVER_KEYCLOAK_CLIENT_ID: {{ .Values.keycloakx.client.id | quote }}
  # CORS — must match the origin seen by browsers (scheme + externalIP)
  OTTERSCALE_SERVER_ALLOWED_ORIGINS: "{{ include "otterscale.externalURL" . }}"
  # External URLs reachable from outside the cluster via NodePort
  OTTERSCALE_SERVER_EXTERNAL_URL: "{{ include "otterscale.scheme" . }}://{{ .Values.istio.externalIP }}:{{ .Values.otterscaleApi.nodePorts.http }}"
  OTTERSCALE_SERVER_EXTERNAL_TUNNEL_URL: "{{ include "otterscale.scheme" . }}://{{ .Values.istio.externalIP }}:{{ .Values.otterscaleApi.nodePorts.tunnel }}"
