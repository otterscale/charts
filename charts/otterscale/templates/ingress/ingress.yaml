{{- if .Values.ingress.enabled -}}
{{/*
Group paths by whether they need rewrite.
Paths with rewrite get their own Ingress resource because
nginx.ingress.kubernetes.io/rewrite-target is Ingress-level.
*/}}
{{- $fullname := include "otterscale.fullname" . -}}
{{- $labels := include "otterscale.labels" . -}}

{{- /* ---- Main Ingress (no rewrite) ---- */}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullname }}
  namespace: {{ include "otterscale.namespace" . }}
  labels:
    {{- $labels | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          {{- if not .rewrite }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                {{- if eq .service "server" }}
                name: {{ include "otterscale.server.fullname" $ }}
                port:
                  number: {{ $.Values.server.ports.http }}
                {{- else if eq .service "dashboard" }}
                name: {{ include "otterscale.dashboard.fullname" $ }}
                port:
                  number: {{ $.Values.dashboard.ports.http }}
                {{- else if eq .service "keycloak" }}
                name: {{ include "otterscale.keycloakx.serviceName" $ }}
                port:
                  number: {{ $.Values.keycloakx.service.port }}
                {{- else if eq .service "harbor" }}
                name: {{ include "otterscale.harbor.serviceName" $ }}
                port:
                  number: {{ include "otterscale.harbor.servicePort" $ }}
                {{- end }}
          {{- end }}
          {{- end }}
    {{- end }}

{{- /* ---- Rewrite Ingress (separate resource per rewrite path group) ---- */}}
{{- $hasRewrite := false }}
{{- range .Values.ingress.hosts }}
  {{- range .paths }}
    {{- if .rewrite }}
      {{- $hasRewrite = true }}
    {{- end }}
  {{- end }}
{{- end }}

{{- if $hasRewrite }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullname }}-rewrite
  namespace: {{ include "otterscale.namespace" . }}
  labels:
    {{- $labels | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          {{- if .rewrite }}
          - path: {{ .path }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                {{- if eq .service "server" }}
                name: {{ include "otterscale.server.fullname" $ }}
                port:
                  number: {{ $.Values.server.ports.http }}
                {{- else if eq .service "dashboard" }}
                name: {{ include "otterscale.dashboard.fullname" $ }}
                port:
                  number: {{ $.Values.dashboard.ports.http }}
                {{- else if eq .service "keycloak" }}
                name: {{ include "otterscale.keycloakx.serviceName" $ }}
                port:
                  number: {{ $.Values.keycloakx.service.port }}
                {{- else if eq .service "harbor" }}
                name: {{ include "otterscale.harbor.serviceName" $ }}
                port:
                  number: {{ include "otterscale.harbor.servicePort" $ }}
                {{- end }}
          {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
{{- end }}
