apiVersion: v1
kind: Secret
metadata:
  name: {{ include "otterscale.dashboard.fullname" . }}-env
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "otterscale.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
type: Opaque
stringData:
  KEYCLOAK_CLIENT_SECRET: {{ include "otterscale.keycloakx.clientSecret" . }}
  REDIS_URL: "redis://:{{ include "otterscale.valkey.password" . }}@{{ .Release.Name }}-dashboard-valkey.{{ .Release.Namespace }}.svc.cluster.local:6379"
