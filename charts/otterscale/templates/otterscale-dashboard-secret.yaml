{{- /* Sensitive env vars for the Dashboard (frontend) component.
     KEYCLOAK_CLIENT_SECRET and REDIS_URL contain credentials and must NOT
     live in a ConfigMap (plaintext / world-readable).  They are injected
     into the Dashboard pod via envFrom secretRef.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "otterscale.dashboard.fullname" . }}-env
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "otterscale.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
type: Opaque
stringData:
  KEYCLOAK_CLIENT_SECRET: {{ include "otterscale.keycloak.clientSecret" . }}
  REDIS_URL: "redis://:{{ include "otterscale.valkey.password" . }}@{{ .Release.Name }}-valkey.{{ .Release.Namespace }}.svc.cluster.local:6379"
