apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "otterscale.dashboard.fullname" . }}-env
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "otterscale.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
data:
  API_URL: "http://{{ include "otterscale.server.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.otterscaleServer.ports.http }}"
  PUBLIC_WEB_URL: "{{ include "otterscale.externalURL" . }}"
  PUBLIC_HARBOR_URL: {{ .Values.harbor.externalURL }}
  KEYCLOAK_REALM_URL: "{{ include "otterscale.externalURL" . }}/auth/realms/otterscale"
  KEYCLOAK_CLIENT_ID: {{ .Values.keycloakx.client.id }}