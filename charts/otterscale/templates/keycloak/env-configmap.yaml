{{- if .Values.keycloakx.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "otterscale.keycloakx.fullname" . }}-env
  namespace: {{ include "otterscale.namespace" . }}
  labels:
    app.kubernetes.io/component: keycloakx
    app.kubernetes.io/part-of: keycloakx
    {{- include "otterscale.labels" . | nindent 4 }}
data:
  KC_BOOTSTRAP_ADMIN_USERNAME: {{ .Values.keycloakx.auth.adminUser | quote }}
  # Pin the OIDC issuer to the full external URL INCLUDING /auth: forwarded
  # headers drop non-standard NodePorts, and in KC26 hostname-v2 a full-URL
  # hostname's path overrides the context path (must match KC_HTTP_RELATIVE_PATH).
  KC_HOSTNAME: {{ printf "%s%s" (include "otterscale.externalURL" .) (.Values.keycloakx.http.relativePath | trimSuffix "/") | quote }}
  KC_HOSTNAME_STRICT: "true"
  JAVA_OPTS_APPEND: >-
    -XX:+UseContainerSupport
    -XX:MaxRAMPercentage=70.0
    -Djava.awt.headless=true
    -Djgroups.dns.query={{ include "otterscale.keycloakx.fullname" . }}-headless
{{- end }}
