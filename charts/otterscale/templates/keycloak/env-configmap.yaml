{{- if .Values.keycloakx.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "otterscale.keycloakx.fullname" . }}-env
  namespace: {{ include "otterscale.namespace" . }}
  labels:
    app.kubernetes.io/component: keycloakx
    app.kubernetes.io/part-of: keycloakx
    {{- include "otterscale.labels" . | nindent 4 }}
data:
  KC_BOOTSTRAP_ADMIN_USERNAME: {{ .Values.keycloakx.auth.adminUser | quote }}
  # Pin Keycloak's frontend hostname to the full external URL (scheme + host +
  # port) so the OIDC issuer is deterministic. Without this, Keycloak derives
  # the issuer from forwarded headers and drops a non-standard NodePort (e.g.
  # :30080), causing "issuer URL did not match" errors in the server.
  KC_HOSTNAME: {{ include "otterscale.externalURL" . | quote }}
  KC_HOSTNAME_STRICT: "true"
  JAVA_OPTS_APPEND: >-
    -XX:+UseContainerSupport
    -XX:MaxRAMPercentage=70.0
    -Djava.awt.headless=true
    -Djgroups.dns.query={{ include "otterscale.keycloakx.fullname" . }}-headless
{{- end }}
