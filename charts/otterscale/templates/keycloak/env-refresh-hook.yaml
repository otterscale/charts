{{- if and .Values.keycloakx.enabled .Values.keycloakInit.enabled .Values.keycloakInit.envRefresh.enabled }}
{{- /*
Checksum of the KC_HOSTNAME inputs (see keycloak/env-configmap.yaml). Stamped
onto the StatefulSet pod template: pods roll only when the checksum changes.
*/ -}}
{{- $checksum := printf "%s%s" (include "otterscale.externalURL" .) (.Values.keycloakx.http.relativePath | trimSuffix "/") | sha256sum -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "otterscale.fullname" . }}-keycloak-env-refresh
  namespace: {{ include "otterscale.namespace" . }}
  labels:
    {{- include "otterscale.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-init
  annotations:
    "helm.sh/hook": post-upgrade,post-rollback
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "otterscale.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: keycloak-init
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "otterscale.fullname" . }}-keycloak-init
      automountServiceAccountToken: true
      {{- with include "otterscale.podNodeSelector" (dict "context" $) }}
      nodeSelector:
        {{- . | nindent 8 }}
      {{- end }}
      containers:
        - name: env-refresh
          image: {{ include "otterscale.image" (dict "imageRoot" .Values.keycloakInit.envRefresh.image "global" .Values.global "chart" .Chart) | quote }}
          imagePullPolicy: {{ .Values.keycloakInit.envRefresh.image.pullPolicy }}
          env:
            - name: STS_NAME
              value: {{ include "otterscale.keycloakx.fullname" . | quote }}
            - name: STS_NAMESPACE
              value: {{ include "otterscale.namespace" . | quote }}
            - name: CHECKSUM
              value: {{ $checksum | quote }}
          command:
            - sh
            - -c
            - |
              set -eu

              SA=/var/run/secrets/kubernetes.io/serviceaccount
              TOKEN=$(cat "${SA}/token")
              URL="https://kubernetes.default.svc/apis/apps/v1/namespaces/${STS_NAMESPACE}/statefulsets/${STS_NAME}"
              BODY='{"spec":{"template":{"metadata":{"annotations":{"otterscale.io/kc-hostname-checksum":"'"${CHECKSUM}"'"}}}}}'

              status=$(curl -sS -o /tmp/response.json -w '%{http_code}' \
                --cacert "${SA}/ca.crt" \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Content-Type: application/strategic-merge-patch+json" \
                -X PATCH "${URL}" -d "${BODY}")

              if [ "${status}" != "200" ]; then
                echo "Failed to patch StatefulSet '${STS_NAME}' (HTTP ${status}):" >&2
                cat /tmp/response.json >&2
                exit 1
              fi
              echo "StatefulSet '${STS_NAME}' stamped with KC_HOSTNAME checksum ${CHECKSUM}."
              echo "Keycloak pods restart only if the checksum changed."
          securityContext:
            runAsNonRoot: true
            runAsUser: 100
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            {{- if .Values.keycloakInit.envRefresh.resources }}
            {{- toYaml .Values.keycloakInit.envRefresh.resources | nindent 12 }}
            {{- else }}
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
