{{- if and .Values.keycloakx.enabled .Values.keycloakInit.enabled .Values.keycloakInit.envRefresh.enabled }}
{{- /*
RBAC for the env-refresh hook Job, scoped to the Keycloak StatefulSet only.
Non-hook resources so they already exist when the hook runs.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "otterscale.fullname" . }}-keycloak-init
  namespace: {{ include "otterscale.namespace" . }}
  labels:
    {{- include "otterscale.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-init
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "otterscale.fullname" . }}-keycloak-init
  namespace: {{ include "otterscale.namespace" . }}
  labels:
    {{- include "otterscale.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-init
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    resourceNames: [{{ include "otterscale.keycloakx.fullname" . | quote }}]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "otterscale.fullname" . }}-keycloak-init
  namespace: {{ include "otterscale.namespace" . }}
  labels:
    {{- include "otterscale.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-init
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "otterscale.fullname" . }}-keycloak-init
subjects:
  - kind: ServiceAccount
    name: {{ include "otterscale.fullname" . }}-keycloak-init
    namespace: {{ include "otterscale.namespace" . }}
{{- end }}
