{{- if .Values.keycloakx.enabled -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  {{- /* Named from database.hostname (like the headless Service) so the
  subchart's non-templated hostname value stays valid for any release name. */}}
  name: {{ .Values.keycloakx.database.hostname }}
  namespace: {{ include "otterscale.namespace" . }}
  labels:
    {{- include "otterscale.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  serviceName: {{ .Values.keycloakx.database.hostname }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "otterscale.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        {{- include "otterscale.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: database
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/keycloak/postgres-secret.yaml") . | sha256sum }}
    spec:
      {{- with include "otterscale.podNodeSelector" (dict "context" $) }}
      nodeSelector:
        {{- . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: "{{ .Values.keycloakx.database.image.repository }}:{{ .Values.keycloakx.database.image.tag }}"
          imagePullPolicy: {{ .Values.keycloakx.database.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloakx.database.existingSecret }}
                  key: postgres-db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloakx.database.existingSecret }}
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloakx.database.existingSecret }}
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: {{ .Values.keycloakx.database.port }}
              protocol: TCP
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            {{- if .Values.keycloakx.database.resources }}
            {{- toYaml .Values.keycloakx.database.resources | nindent 12 }}
            {{- else }}
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
            {{- end }}
      volumes:
        - name: postgres-data
        {{- if .Values.keycloakx.database.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.keycloakx.database.hostname }}-data
        {{- else }}
          emptyDir: {}
        {{- end }}
{{- end }}
