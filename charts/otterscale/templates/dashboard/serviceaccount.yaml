{{- if .Values.dashboard.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "otterscale.dashboard.serviceAccountName" . }}
  namespace: {{ include "otterscale.namespace" . }}
  labels:
    {{- include "otterscale.dashboard.labels" . | nindent 4 }}
  {{- with .Values.dashboard.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.dashboard.serviceAccount.automountServiceAccountToken }}
{{- end }}
