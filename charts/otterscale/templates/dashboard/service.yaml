apiVersion: v1
kind: Service
metadata:
  name: {{ include "otterscale.dashboard.fullname" . }}
  namespace: {{ include "otterscale.namespace" . }}
  labels:
    {{- include "otterscale.dashboard.labels" . | nindent 4 }}
    {{- with .Values.dashboard.service.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.dashboard.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.dashboard.service.type }}
  selector:
    {{- include "otterscale.dashboard.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.dashboard.ports.http }}
      targetPort: http
      protocol: TCP
