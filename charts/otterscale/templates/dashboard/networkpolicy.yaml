{{- if .Values.dashboard.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "otterscale.dashboard.fullname" . }}
  namespace: {{ include "otterscale.namespace" . }}
  labels:
    {{- include "otterscale.dashboard.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "otterscale.dashboard.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: {{ .Values.dashboard.ports.http }}
          protocol: TCP
    {{- with .Values.dashboard.networkPolicy.ingress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow traffic to pods in the same namespace (Server API, Keycloak, Valkey)
    - to:
        - namespaceSelector: {}
          podSelector: {}
    {{- with .Values.dashboard.networkPolicy.egress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
