apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "otterscale.dashboard.fullname" . }}
  namespace: {{ include "otterscale.namespace" . }}
  labels:
    {{- include "otterscale.dashboard.labels" . | nindent 4 }}
spec:
  {{- if not .Values.dashboard.autoscaling.enabled }}
  replicas: {{ .Values.dashboard.replicaCount }}
  {{- end }}
  {{- with .Values.dashboard.revisionHistoryLimit }}
  revisionHistoryLimit: {{ . }}
  {{- end }}
  {{- with .Values.dashboard.updateStrategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "otterscale.dashboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "otterscale.dashboard.selectorLabels" . | nindent 8 }}
        {{- with .Values.dashboard.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/dashboard/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/dashboard/secret.yaml") . | sha256sum }}
        {{- with .Values.dashboard.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "otterscale.dashboard.serviceAccountName" . }}
      {{- with (concat (.Values.global.imagePullSecrets | default list) (.Values.dashboard.imagePullSecrets | default list)) }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.dashboard.terminationGracePeriodSeconds }}
      {{- with .Values.dashboard.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: otterscale-dashboard
          image: {{ include "otterscale.image" (dict "imageRoot" .Values.dashboard.image "global" .Values.global "chart" .Chart) | quote }}
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          {{- with .Values.dashboard.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.dashboard.ports.http }}
              protocol: TCP
          env:
            - name: PUBLIC_APP_VERSION
              value: {{ .Chart.AppVersion | quote }}
            {{- with .Values.dashboard.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "otterscale.dashboard.fullname" . }}-config
            - secretRef:
                name: {{ include "otterscale.dashboard.fullname" . }}-secret
            {{- with .Values.dashboard.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.dashboard.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.dashboard.readinessProbe.httpGet.path }}
              port: {{ .Values.dashboard.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.dashboard.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.dashboard.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.dashboard.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.dashboard.readinessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.dashboard.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.dashboard.livenessProbe.httpGet.path }}
              port: {{ .Values.dashboard.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.dashboard.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.dashboard.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.dashboard.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.dashboard.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.dashboard.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.dashboard.startupProbe.httpGet.path }}
              port: {{ .Values.dashboard.startupProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.dashboard.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.dashboard.startupProbe.periodSeconds }}
            failureThreshold: {{ .Values.dashboard.startupProbe.failureThreshold }}
          {{- end }}
          {{- with .Values.dashboard.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.dashboard.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- with .Values.dashboard.extraContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.dashboard.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
