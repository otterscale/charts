apiVersion: v1
kind: Secret
metadata:
  name: {{ include "otterscale.dashboard.fullname" . }}-secret
  namespace: {{ include "otterscale.namespace" . }}
  labels:
    {{- include "otterscale.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
type: Opaque
stringData:
  {{- if .Values.keycloakx.enabled }}
  KEYCLOAK_CLIENT_SECRET: {{ include "otterscale.keycloakx.clientSecret" . | quote }}
  {{- end }}
  {{- if (index .Values "dashboard-valkey").enabled }}
  REDIS_URL: {{ printf "redis://:%s@%s-dashboard-valkey.%s.svc.cluster.local:%v" (include "otterscale.valkey.password" .) .Release.Name (include "otterscale.namespace" .) (index .Values "dashboard-valkey").port | quote }}
  {{- end }}
