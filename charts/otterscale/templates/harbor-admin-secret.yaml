{{- if .Values.harbor.enabled }}
{{- /*
  Harbor admin password:
  - Key: HARBOR_ADMIN_PASSWORD (Harbor subchart's expected env-var key).
  - On first install: uses randAlphaNum(32) → random, effectively unknowable.
  - On upgrade:       looks up the existing Secret and reuses the stored value
                      so helm upgrade never rotates the password.
  - Manual override:  set harbor.harborAdminPassword in values.yaml (debug only).
  NOTE: Harbor's built-in 'admin' account cannot be deleted.  Generating a
  random password makes it inaccessible in practice; all real administration
  is performed through the OIDC admin (harbor_admins group).
*/ -}}
{{- $secretName := printf "%s-harbor-admin" (include "otterscale.fullname" .) -}}
{{- $existing   := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $password   := "" -}}
{{- if and $existing $existing.data (index $existing.data "HARBOR_ADMIN_PASSWORD") -}}
  {{- $password = index $existing.data "HARBOR_ADMIN_PASSWORD" | b64dec -}}
{{- else -}}
  {{- $password = .Values.harbor.harborAdminPassword | default (randAlphaNum 32) -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "otterscale.labels" . | nindent 4 }}
    app.kubernetes.io/component: harbor
type: Opaque
stringData:
  HARBOR_ADMIN_PASSWORD: {{ $password | quote }}
{{- end }}
