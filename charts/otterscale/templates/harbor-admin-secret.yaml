{{- if .Values.harbor.enabled }}
{{- /* Harbor admin password stored as a Secret so it is never exposed as a
     plain env value in any Pod spec (visible via `kubectl describe pod`).
     The harbor-oidc-job references this Secret via secretKeyRef.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "otterscale.fullname" . }}-harbor-admin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "otterscale.labels" . | nindent 4 }}
    app.kubernetes.io/component: harbor
type: Opaque
stringData:
  admin-password: {{ .Values.harbor.harborAdminPassword | quote }}
{{- end }}
