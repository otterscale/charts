apiVersion: v2
name: otterscale
appVersion: SXHR0103T-0000
version: 1.3.0-rc.0
description: OtterScale - A unified platform for simplified compute, storage, and networking
home: https://otterscale.github.io
icon: https://github.com/otterscale.png
sources:
  - https://github.com/otterscale/otterscale
maintainers:
  - name: Yi-Lin Wu
    email: terry_wu@phison.com
  - name: Chung-Hsuan Tsai
    email: paul_tsai@phison.com
keywords:
  - otterscale
  - kubernetes
  - helm
type: application
kubeVersion: ">=1.25.0-0"
annotations:
  artifacthub.io/changes: |
    - kind: added
      description: ServiceAccount, HPA, PDB, NetworkPolicy, ServiceMonitor templates
    - kind: added
      description: Standard Kubernetes Ingress support
    - kind: added
      description: values.schema.json for input validation
    - kind: added
      description: NOTES.txt post-install instructions
    - kind: added
      description: Helm test templates for connectivity verification
    - kind: changed
      description: Template directory reorganization by component
    - kind: changed
      description: Full parameterization of resources, probes, security contexts, and service types
  artifacthub.io/license: Apache-2.0
dependencies:
  - condition: keycloakx.enabled
    repository: "https://codecentric.github.io/helm-charts"
    name: keycloakx
    version: 7.1.11
  - condition: dashboard-valkey.enabled
    repository: "https://valkey.io/valkey-helm/"
    name: valkey
    alias: dashboard-valkey
    version: 0.9.4
  - condition: harbor.enabled
    repository: "https://helm.goharbor.io"
    name: harbor
    version: 1.18.4
  - name: common
    repository: oci://registry-1.docker.io/bitnamicharts
    tags:
      - bitnami-common
    version: 2.40.0
