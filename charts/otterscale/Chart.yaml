apiVersion: v2
name: otterscale
# renovate: github=otterscale/otterscale
appVersion: v0.8.0
version: 0.8.8
description: OtterScale - A unified platform for simplified compute, storage, and networking
home: https://otterscale.github.io
icon: https://github.com/otterscale.png
sources:
  - https://github.com/otterscale/otterscale
maintainers:
  - name: Yi-Lin Wu
    email: terry_wu@phison.com
  - name: Chung-Hsuan Tsai
    email: paul_tsai@phison.com
keywords:
  - otterscale
type: application
dependencies:
  - condition: keycloakx.enabled
    repository: "https://codecentric.github.io/helm-charts"
    name: keycloakx
    version: 7.1.x
  - condition: dashboard-valkey.enabled
    repository: "https://valkey.io/valkey-helm/"
    name: valkey
    alias: dashboard-valkey
    version: 0.9.x
  - condition: harbor.enabled
    repository: "https://helm.goharbor.io"
    name: harbor
    version: 1.18.x
  - name: common
    repository: oci://registry-1.docker.io/bitnamicharts
    tags:
      - bitnami-common
    version: 2.x.x
