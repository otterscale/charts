# https://raw.githubusercontent.com/envoyproxy/ai-gateway/v0.5.0/manifests/envoy-gateway-values.yaml
# https://raw.githubusercontent.com/envoyproxy/ai-gateway/v0.5.0/examples/inference-pool/envoy-gateway-values-addon.yaml

gateway-helm:
  config:
    envoyGateway:
      gateway:
        controllerName: gateway.envoyproxy.io/gatewayclass-controller
      logging:
        level:
          default: info
      provider:
        type: Kubernetes
      extensionApis:
        # Not strictly required, but recommended for backward/future compatibility.
        enableEnvoyPatchPolicy: true
        # Required: Enable Backend API for AI service backends.
        enableBackend: true
      # Required: AI Gateway needs to fine-tune xDS resources generated by Envoy Gateway.
      extensionManager:
        # Enable InferencePool custom resource support
        backendResources:
          - group: inference.networking.k8s.io
            kind: InferencePool
            version: v1
        hooks:
          xdsTranslator:
            translation:
              listener:
                includeAll: true
              route:
                includeAll: true
              cluster:
                includeAll: true
              secret:
                includeAll: true
            post:
              - Translation
              - Cluster
              - Route
        service:
          fqdn:
            # IMPORTANT: Update this to match your AI Gateway controller service
            # Format: <service-name>.<namespace>.svc.cluster.local
            # Default if you followed the installation steps above:
            hostname: ai-gateway-controller.envoy-ai-gateway-system.svc.cluster.local
            port: 1063
