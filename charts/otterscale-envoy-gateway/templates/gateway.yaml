apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: otterscale-gateway
  namespace: {{ .Release.Namespace }}
spec:
  gatewayClassName: envoy-otterscale
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
