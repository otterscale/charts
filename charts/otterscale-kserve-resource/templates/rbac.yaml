kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: otterscale-llminferenceserviceconfig-reader
  namespace: otterscale-system
rules:
  - apiGroups: ["serving.kserve.io"]
    resources:
      - llminferenceserviceconfigs
      - llminferenceserviceconfigs/status
    verbs:
      - get
      - list
      - watch
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: otterscale-llminferenceserviceconfig-reader
  namespace: otterscale-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: otterscale-llminferenceserviceconfig-reader
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:authenticated
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    rbac.authorization.k8s.io/aggregate-to-admin: "true"
  name: kserve-admin-role
rules:
  - apiGroups:
      - serving.kserve.io
    resources:
      - llminferenceserviceconfigs
      - llminferenceservices
      - localmodelnamespacecaches
    verbs:
      - "*"
  - apiGroups:
      - serving.kserve.io
    resources:
      - llminferenceserviceconfigs/status
      - llminferenceservices/status
      - localmodelnamespacecaches/status
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
  name: kserve-editor-role
rules:
  - apiGroups:
      - serving.kserve.io
    resources:
      - llminferenceserviceconfigs
      - llminferenceservices
      - localmodelnamespacecaches
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - serving.kserve.io
    resources:
      - llminferenceserviceconfigs/status
      - llminferenceservices/status
      - localmodelnamespacecaches/status
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    rbac.authorization.k8s.io/aggregate-to-view: "true"
  name: kserve-viewer-role
rules:
  - apiGroups:
      - serving.kserve.io
    resources:
      - llminferenceserviceconfigs
      - llminferenceservices
      - localmodelnamespacecaches
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - serving.kserve.io
    resources:
      - llminferenceserviceconfigs/status
      - llminferenceservices/status
      - localmodelnamespacecaches/status
    verbs:
      - get
