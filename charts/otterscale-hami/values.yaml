hami:
  global:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "31992"

  scheduler:
    # binpack (concentrated) and spread
    defaultSchedulerPolicy:
      nodeSchedulerPolicy: binpack
      gpuSchedulerPolicy: binpack
    service:
      type: ClusterIP
    kubeScheduler:
      image:
        registry: "registry.k8s.io"
        repository: "kube-scheduler"
    certManager:
      enabled: true
    patch: 
      enabled: false

  devicePlugin:
    enabled: true
    gpuOperatorToolkitReady:
      enabled: true
      hostPath: "/run/nvidia/validations"
    deviceSplitCount: 20
    deviceMemoryScaling: 1
    deviceCoreScaling: 1
    service:
      type: ClusterIP
    runtimeClassName: "nvidia"
    nvidiaNodeSelector:
      otterscale.io/gpu: "true"
    nodeConfiguration:
      config: |
        {
          "nodeconfig": [
            {
              "name": "your-node-name",
              "operatingmode": "mig",
              "migstrategy": "none",
              "filterdevices": {
                "uuid": [],
                "index": []
              }
            }
          ]
        }

  dra:
    enabled: false

  hami-dra:
    drivers:
      nvidia:
        enabled: true
        # If you are using gpu driver on host, you need to set this to false
        containerDriver: true

# ServiceMonitor configuration for Prometheus
serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 15s
  path: /metrics
