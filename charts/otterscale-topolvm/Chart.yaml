apiVersion: v2
name: otterscale-topolvm
version: 1.4.0-rc.1
appVersion: "1.4.0-rc.1"
description: >-
  TopoLVM CSI driver bundle (lvmd, node plugin, controller and sidecars) that
  exposes pre-provisioned LVM volume groups as PVCs. Ships a checker DaemonSet
  that detects the vg_aidaptiv volume group on each node and labels matching
  nodes so TopoLVM only deploys there.
home: https://github.com/otterscale/topolvm
icon: https://www.phison.com/wp-content/uploads/2025/11/Phison-Favicon-512-150x150.png
sources:
  - https://github.com/otterscale/charts
maintainers:
  - name: Terry Wu
    email: terry_wu@phison.com
keywords:
  - topolvm
  - lvm
  - csi
  - storage
type: application
kubeVersion: ">=1.25.0-0"
annotations:
  module.otterscale.io/namespace: "topolvm-system"
  artifacthub.io/license: Apache-2.0
dependencies:
  - name: otterscale-phison-topolvm
    version: 1.4.0-rc.1
    repository: oci://ghcr.io/otterscale/charts
