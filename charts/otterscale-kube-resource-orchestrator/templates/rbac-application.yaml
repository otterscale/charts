apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    rbac.authorization.k8s.io/aggregate-to-admin: "true"
  name: kro-application-admin-role
rules:
  - apiGroups:
      - kro.run
    resources:
      - applications
    verbs:
      - "*"
  - apiGroups:
      - kro.run
    resources:
      - applications/status
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
  name: kro-application-editor-role
rules:
  - apiGroups:
      - kro.run
    resources:
      - applications
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - kro.run
    resources:
      - applications/status
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    rbac.authorization.k8s.io/aggregate-to-view: "true"
  name: kro-application-viewer-role
rules:
  - apiGroups:
      - kro.run
    resources:
      - applications
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - kro.run
    resources:
      - applications/status
    verbs:
      - get
