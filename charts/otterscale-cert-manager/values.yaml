# Default values for otterscale-cert-manager
# This is a wrapper chart. Configure cert-manager values here.

cert-manager:
  # Default cert-manager configuration
  # See: https://github.com/cert-manager/cert-manager/tree/master/deploy/charts/cert-manager
  
  installCRDs: true
  
  global:
    leaderElection:
      namespace: cert-manager
  
