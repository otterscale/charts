# Upstream: https://github.com/kubernetes-sigs/node-feature-discovery/tree/master/deployment/helm/node-feature-discovery
node-feature-discovery:
  master:
    extraLabelNs:
      - otterscale.io
    # Avoid literal `null` in nfd-master.conf (upstream default `master.config` parses as null in YAML).
    config: {}
  worker:
    config:
      core:
        sleepInterval: 60s

# DaemonSet: runs the feature scripts on each node and atomically refreshes files under
# /etc/kubernetes/node-feature-discovery/features.d/ for the NFD local source.
featureWriter:
  enabled: true
  # Official slim image: /bin/sh (dash), coreutils, util-linux.
  image:
    repository: debian
    tag: bookworm-slim
  imagePullPolicy: IfNotPresent
  intervalSeconds: 60
  volumeGroupFeatureFileName: otterscale-volume-group-features
  gpuFeatureFileName: otterscale-gpu-features
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi
  tolerations: []
  nodeSelector: {}
  affinity: {}
  priorityClassName: ""
  podAnnotations: {}
  podLabels: {}
  securityContext:
    runAsUser: 0
    privileged: true
