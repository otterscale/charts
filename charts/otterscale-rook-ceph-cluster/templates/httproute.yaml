kind: HTTPRoute
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: ceph-objectstore
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: rook-ceph-ingress-gateway
      namespace: rook-ceph
  rules:
    - backendRefs:
        - name: rook-ceph-rgw-ceph-objectstore
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /