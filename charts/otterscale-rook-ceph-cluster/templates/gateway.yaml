apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: rook-ceph-ingress-gateway
  namespace: {{ .Release.Namespace }}
spec:
  gatewayClassName: envoy
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: rook-ceph-envoyproxy
