{{- if .Values.objectstoreRbac.enabled -}}
{{- $namespace := include "rook-ceph-cluster.namespace" . -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rook-ceph-objectstore-accessor
  namespace: {{ $namespace }}
rules:
  - apiGroups: ["ceph.rook.io"]
    resources: ["cephobjectstores"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["ceph.rook.io"]
    resources: ["cephobjectstoreusers"]
    verbs: ["create", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rook-ceph-objectstore-accessor
  namespace: {{ $namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rook-ceph-objectstore-accessor
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:authenticated
{{- end }}
