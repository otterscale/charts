{{- if .Values.nfsServer.enabled -}}
{{- $namespace := include "rook-ceph-cluster.namespace" . -}}
---
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: nfs-export-client
spec:
  schema:
    apiVersion: v1alpha1
    kind: NFSExportClient
    spec:
      nfsExportName: string | required=true
      nfsExportNamespace: string | required=true
      clients: string | required=true
    status:
      nfsExportRef:
        name: ${nfsExport.metadata.name}
        namespace: ${nfsExport.metadata.namespace}
      configMapRef:
        name: ${configMap.metadata.name}
        namespace: ${configMap.metadata.namespace}

  resources:
    - id: nfsExport
      externalRef:
        apiVersion: kro.run/v1alpha1
        kind: NFSExport
        metadata:
          name: ${schema.spec.nfsExportName}
          namespace: ${schema.spec.nfsExportNamespace}
      readyWhen:
        - ${nfsExport.status.state == "ACTIVE"}

    - id: configMap
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${nfsExport.status.configMapRef.name}
          namespace: ${nfsExport.status.configMapRef.namespace}
      readyWhen:
        - ${configMap.data.mountPath != ""}

    - id: toolbox
      externalRef:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: rook-ceph-tools
          namespace: {{ $namespace }}
      readyWhen:
        - ${toolbox.status.readyReplicas == 1}

    - id: job
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.metadata.name}-job
          namespace: ${schema.spec.nfsExportNamespace}
        spec:
          ttlSecondsAfterFinished: 300
          template:
            spec:
              serviceAccountName: nfs-export-sa
              restartPolicy: Never
              containers:
              - name: nfs-export-client
                image: alpine/k8s:1.30.2
                command:
                - bash
                - -c
                - |
                  set -e
                  FS_NAMESPACE="${nfsExport.status.cephNfsRef.namespace}"
                  NFS_SERVER="${nfsExport.status.cephNfsRef.name}"
                  EXPORT_PATH="${nfsExport.spec.exportPath}"
                  CLIENTS='${schema.spec.clients}'
                  CM_NAMESPACE="${configMap.metadata.namespace}"
                  CM_NAME="${configMap.metadata.name}"

                  # Resolve toolbox pod
                  TOOLBOX=$$(kubectl get pod -n $$FS_NAMESPACE -l app=rook-ceph-tools -o jsonpath='{.items[0].metadata.name}')
                  echo "Using toolbox: $$TOOLBOX"

                  # Get current export config
                  EXPORT_DATA=$$(kubectl exec -n $$FS_NAMESPACE $$TOOLBOX -- ceph nfs export get $$NFS_SERVER $$EXPORT_PATH --format json 2>/dev/null || echo "{}")

                  # Build updated export config with desired clients
                  UPDATED_EXPORT_DATA=$$(echo "$$EXPORT_DATA" | python3 -c "
                  import sys, json
                  export = json.load(sys.stdin)
                  clients = json.loads('$$CLIENTS')
                  export['clients'] = clients
                  print(json.dumps(export))
                  ")

                  # Write config to temp file and apply
                  kubectl exec -n $$FS_NAMESPACE $$TOOLBOX -- bash -c "echo '$$UPDATED_EXPORT_DATA' > /tmp/nfs-export.json && ceph nfs export apply $$NFS_SERVER -i /tmp/nfs-export.json"

                  # Verify: read back current clients
                  CURRENT_CLIENTS=$$(kubectl exec -n $$FS_NAMESPACE $$TOOLBOX -- bash -c "ceph nfs export get $$NFS_SERVER $$EXPORT_PATH --format json | python3 -c \"import sys,json; d=json.load(sys.stdin); print(json.dumps(d.get('clients',[])))\"" 2>/dev/null || echo "[]")
                  CURRENT_CLIENTS=$$(echo "$$CURRENT_CLIENTS" | tr -d '\r\n')

                  # Update the NFSExport's configmap with new clients
                  kubectl get configmap $$CM_NAME -n $$CM_NAMESPACE -o json | python3 -c "
                  import sys, json
                  cm = json.load(sys.stdin)
                  cm['data']['clients'] = '$$CURRENT_CLIENTS'
                  print(json.dumps(cm))
                  " | kubectl apply -f -
      readyWhen:
        - ${job.status.succeeded == 1}
{{- end }}