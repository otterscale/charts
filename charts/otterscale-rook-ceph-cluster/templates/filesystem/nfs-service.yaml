{{- if .Values.nfsServer.enabled -}}
{{- $namespace := include "rook-ceph-cluster.namespace" . -}}
{{- range (index .Values "rook-ceph-cluster").cephFileSystems }}
---
apiVersion: v1
kind: Service
metadata:
  name: rook-ceph-nfs-{{ .name }}-nfs-external
  namespace: {{ $namespace }}
spec:
  type: NodePort
  externalTrafficPolicy: Local
  ports:
    - name: nfs
      port: 2049
      targetPort: 2049
  selector:
    app: rook-ceph-nfs
    ceph_nfs: {{ .name }}-nfs
    instance: a
{{- end }}
{{- end }}