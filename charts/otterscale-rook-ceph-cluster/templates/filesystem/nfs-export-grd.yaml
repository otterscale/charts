{{- if .Values.nfsServer.enabled -}}
{{- $namespace := include "rook-ceph-cluster.namespace" . -}}
---
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: nfs-export
spec:
  schema:
    apiVersion: v1alpha1
    kind: NFSExport
    spec:
      targetNamespace: string | required=true
      fsName: string | required=true
      exportPath: string | required=true
      clients: [] | default=[]
    status:
      configMapRef:
        name: ${configMap.metadata.name}
        namespace: ${configMap.metadata.namespace}
      cephFilesystemRef:
        name: ${cephFilesystem.metadata.name}
        namespace: ${cephFilesystem.metadata.namespace}
      cephNfsRef:
        name: ${cephNfs.metadata.name}
        namespace: ${cephNfs.metadata.namespace}
      serviceRef:
        name: ${service.metadata.name}
        namespace: ${service.metadata.namespace}

  resources:
    - id: cephFilesystem
      externalRef:
        apiVersion: ceph.rook.io/v1
        kind: CephFilesystem
        metadata:
          name: ${schema.spec.fsName}
          namespace: {{ $namespace }}

    - id: cephNfs
      externalRef:
        apiVersion: ceph.rook.io/v1
        kind: CephNFS
        metadata:
          name: ${schema.spec.fsName}-nfs
          namespace: {{ $namespace }}

    - id: service
      externalRef:
        apiVersion: v1
        kind: Service
        metadata:
          name: rook-ceph-nfs-${schema.spec.fsName}-nfs-external
          namespace: {{ $namespace }}

    - id: toolbox
      externalRef:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: rook-ceph-tools
          namespace: {{ $namespace }}
      readyWhen:
        - ${toolbox.status.readyReplicas == 1}

    - id: targetNamespace
      template:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.targetNamespace}

    - id: configMap
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.metadata.name}-configmap
          namespace: ${targetNamespace.metadata.name}
      readyWhen:
        - ${configMap.data.mountPath != ""}

    - id: controller
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.metadata.name}-controller
          namespace: {{ $namespace }}
        spec:
          replicas: 1
          strategy:
            type: Recreate
          selector:
            matchLabels:
              app: nfs-export-controller
              nfs-export: ${schema.metadata.name}
          template:
            metadata:
              labels:
                app: nfs-export-controller
                nfs-export: ${schema.metadata.name}
            spec:
              serviceAccountName: nfs-export-sa
              containers:
              - name: controller
                image: alpine/k8s:1.30.2
                env:
                - name: FS_NAMESPACE
                  value: "{{ $namespace }}"
                - name: FS_NAME
                  value: "${cephFilesystem.metadata.name}"
                - name: NFS_SERVER
                  value: "${cephNfs.metadata.name}"
                - name: SERVICE_NAME
                  value: "${service.metadata.name}"
                - name: EXPORT_NAME
                  value: "${schema.metadata.name}"
                - name: EXPORT_NAMESPACE
                  value: "${schema.metadata.namespace}"
                - name: EXPORT_PATH
                  value: "${schema.spec.exportPath}"
                - name: CM_NAME
                  value: "${schema.metadata.name}-configmap"
                - name: CM_NAMESPACE
                  value: "${targetNamespace.metadata.name}"
                command: ["bash", "-c"]
                args:
                - |
                  set -e
                  echo "=== NFS Export Controller for $EXPORT_NAME ==="

                  get_toolbox() {
                    kubectl get pod -n $FS_NAMESPACE -l app=rook-ceph-tools \
                      -o jsonpath='{.items[0].metadata.name}'
                  }

                  # === Phase 1: Initial Setup ===
                  echo "[$(date -Iseconds)] Phase 1: Creating subvolume and export"
                  
                  TOOLBOX=$(get_toolbox)
                  echo "Using toolbox: $TOOLBOX"

                  # Get NFS nodePort by port name
                  NODE_PORT=$(kubectl get service $SERVICE_NAME -n $FS_NAMESPACE -o json | \
                    jq -r '.spec.ports[] | select(.name=="nfs") | .nodePort')
                  
                  if [ -z "$NODE_PORT" ] || [ "$NODE_PORT" = "null" ]; then
                    echo "[$(date -Iseconds)] ERROR: Could not find port with name 'nfs' in service $SERVICE_NAME"
                    exit 1
                  fi
                  echo "[$(date -Iseconds)] Found NFS nodePort: $NODE_PORT"

                  # Get NFS nodeIp by node type
                  NODE_IP=$(kubectl get nodes -o json | \
                    jq -r '.items[0].status.addresses[] | select(.type=="InternalIP") | .address')

                  # Create subvolume (idempotent - succeeds if already exists)
                  echo "[$(date -Iseconds)] Ensuring subvolume exists..."
                  kubectl exec -n $FS_NAMESPACE $TOOLBOX -- \
                    ceph fs subvolume create $FS_NAME $EXPORT_NAME || {
                      echo "[$(date -Iseconds)] Subvolume may already exist, continuing..."
                    }

                  # Get subvolume path
                  SUBVOLUME_PATH=$(kubectl exec -n $FS_NAMESPACE $TOOLBOX -- \
                    ceph fs subvolume getpath $FS_NAME $EXPORT_NAME | tr -d '\r\n')
                  echo "[$(date -Iseconds)] Subvolume path: $SUBVOLUME_PATH"

                  # Create NFS export (Ceph will reject if path already exists with different config)
                  echo "[$(date -Iseconds)] Creating NFS export..."
                  if ! kubectl exec -n $FS_NAMESPACE $TOOLBOX -- \
                    ceph nfs export create cephfs $NFS_SERVER $EXPORT_PATH $FS_NAME \
                    --path $SUBVOLUME_PATH 2>&1; then
                    
                    echo "[$(date -Iseconds)] ERROR: Failed to create NFS export at $EXPORT_PATH"
                    echo "[$(date -Iseconds)] This may indicate the export path is already in use"
                    
                    # List existing exports for debugging
                    echo "[$(date -Iseconds)] Current exports on $NFS_SERVER:"
                    kubectl exec -n $FS_NAMESPACE $TOOLBOX -- \
                      ceph nfs export ls $NFS_SERVER 2>/dev/null || true
                    
                    exit 1
                  fi
                  echo "[$(date -Iseconds)] NFS export created successfully"

                  # Get pool information
                  POOL=$(kubectl exec -n $FS_NAMESPACE $TOOLBOX -- bash -c \
                    "ceph fs subvolume info $FS_NAME $EXPORT_NAME --format json | \
                     python3 -c \"import sys,json; d=json.load(sys.stdin); \
                     print(d.get('pool_namespace','') or d.get('data_pool','unknown'))\"" \
                    2>/dev/null | tr -d '\r\n' || echo "unknown")

                  MOUNT_PATH="$NODE_IP:$EXPORT_PATH"

                  # Initialize ConfigMap
                  echo "[$(date -Iseconds)] Creating ConfigMap..."
                  kubectl create configmap $CM_NAME \
                    -n $CM_NAMESPACE \
                    --from-literal=mountPath="$MOUNT_PATH" \
                    --from-literal=nodePort="$NODE_PORT" \
                    --from-literal=pool="$POOL" \
                    --from-literal=subvolumePath="$SUBVOLUME_PATH" \
                    --from-literal=clients="[]" \
                    --dry-run=client -o yaml | kubectl apply -f -
                  echo "[$(date -Iseconds)] ConfigMap initialized"

                  # === Phase 2: Reconcile Loop ===
                  echo "[$(date -Iseconds)] Phase 2: Starting reconciliation loop"

                  reconcile() {
                    TOOLBOX=$(get_toolbox)

                    # Get desired state from NFSExport CR (always apply whatever we read)
                    DESIRED=$(kubectl get nfsexport $EXPORT_NAME -n $EXPORT_NAMESPACE \
                      -o jsonpath='{.spec.clients}' 2>/dev/null || echo "[]")

                    echo "[$(date -Iseconds)] Forcing Ceph export update with clients: $DESIRED"

                    # Try to base on existing export if available, otherwise construct minimal object.
                    EXPORT_DATA=$(kubectl exec -n $FS_NAMESPACE $TOOLBOX -- \
                      ceph nfs export get $NFS_SERVER $EXPORT_PATH --format json 2>/dev/null) || \
                      EXPORT_DATA='{\"path\": "'$EXPORT_PATH'", \"clients\": []}'

                    UPDATED=$(python3 -c "import json,sys; e=json.loads(sys.argv[1]); e['clients']=json.loads(sys.argv[2]); print(json.dumps(e))" \
                      "$EXPORT_DATA" "$DESIRED")

                    # Apply the updated configuration to Ceph
                    if ! kubectl exec -n $FS_NAMESPACE $TOOLBOX -- bash -c '
                      cat <<"INNER_EOF" > /tmp/nfs-export.json
                      '"$UPDATED"'+
                      INNER_EOF
                      ceph nfs export apply "$NFS_SERVER" -i /tmp/nfs-export.json
                      ' 2>&1; then
                      echo "[$(date -Iseconds)] ERROR: Failed to apply export configuration to Ceph"
                      return 1
                    fi

                    echo "[$(date -Iseconds)] Ceph export apply executed, verifying..."

                    # Verify the update was applied and extract actual clients
                    ACTUAL=$(kubectl exec -n $FS_NAMESPACE $TOOLBOX -- bash -c \
                      "ceph nfs export get $NFS_SERVER $EXPORT_PATH --format json 2>/dev/null" \
                      | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d.get('clients',[])))" 2>/dev/null | tr -d '\r\n' || echo "")

                    if [ -z "$ACTUAL" ]; then
                      echo "[$(date -Iseconds)] ERROR: Verification failed or no clients found; ConfigMap will not be updated"
                      return 1
                    fi

                    # Update ConfigMap only after successful verification
                    if kubectl patch configmap $CM_NAME -n $CM_NAMESPACE --type merge -p "{\"data\":{\"clients\":\"$ACTUAL\"}}" 2>&1; then
                      echo "[$(date -Iseconds)] ConfigMap synced with actual Ceph state"
                    else
                      echo "[$(date -Iseconds)] WARNING: ConfigMap patch failed"
                      return 1
                    fi
                  }

                  # Initial reconciliation
                  reconcile

                  # Watch for changes to NFSExport CR
                  while true; do
                    kubectl get nfsexport $EXPORT_NAME -n $EXPORT_NAMESPACE \
                      --watch --output-watch-events -o json 2>/dev/null \
                    | while read line; do
                        echo "[$(date -Iseconds)] Watch event received"
                        reconcile
                      done

                    echo "[$(date -Iseconds)] Watch disconnected, reconnecting in 3s..."
                    sleep 3
                  done
{{- end }}