{{- if .Values.nfsServer.enabled -}}
{{- $namespace := include "rook-ceph-cluster.namespace" . -}}
---
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: nfs-export
spec:
  schema:
    apiVersion: v1alpha1
    kind: NFSExport
    spec:
      targetNamespace: string | required=true
      fsName: string | required=true
      exportPath: string | required=true
      clients: string | default="[]"
    status:
      configMapRef:
        name: ${configMap.metadata.name}
        namespace: ${configMap.metadata.namespace}
      cephFilesystemRef:
        name: ${cephFilesystem.metadata.name}
        namespace: ${cephFilesystem.metadata.namespace}
      cephNfsRef:
        name: ${cephNfs.metadata.name}
        namespace: ${cephNfs.metadata.namespace}
      serviceRef:
        name: ${service.metadata.name}
        namespace: ${service.metadata.namespace}

  resources:
    - id: cephFilesystem
      externalRef:
        apiVersion: ceph.rook.io/v1
        kind: CephFilesystem
        metadata:
          name: ${schema.spec.fsName}
          namespace: {{ $namespace }}

    - id: cephNfs
      externalRef:
        apiVersion: ceph.rook.io/v1
        kind: CephNFS
        metadata:
          name: ${schema.spec.fsName}-nfs
          namespace: {{ $namespace }}

    - id: service
      externalRef:
        apiVersion: v1
        kind: Service
        metadata:
          name: rook-ceph-nfs-${schema.spec.fsName}-nfs-external
          namespace: {{ $namespace }}

    - id: toolbox
      externalRef:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: rook-ceph-tools
          namespace: {{ $namespace }}
      readyWhen:
        - ${toolbox.status.readyReplicas == 1}

    - id: targetNamespace
      template:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.targetNamespace}

    - id: configMap
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.metadata.name}-configmap
          namespace: ${targetNamespace.metadata.name}
      readyWhen:
        - ${configMap.data.mountPath != ""}

    - id: controller
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.metadata.name}-controller
          namespace: {{ $namespace }}
        spec:
          replicas: 1
          strategy:
            type: Recreate
          selector:
            matchLabels:
              app: nfs-export-controller
              nfs-export: ${schema.metadata.name}
          template:
            metadata:
              labels:
                app: nfs-export-controller
                nfs-export: ${schema.metadata.name}
            spec:
              serviceAccountName: nfs-export-sa
              containers:
              - name: controller
                image: alpine/k8s:1.30.2
                env:
                - name: FS_NAMESPACE
                  value: "{{ $namespace }}"
                - name: FS_NAME
                  value: "${cephFilesystem.metadata.name}"
                - name: NFS_SERVER
                  value: "${cephNfs.metadata.name}"
                - name: NODE_PORT
                  value: "${string(service.spec.ports[0].nodePort)}"
                - name: EXPORT_NAME
                  value: "${schema.metadata.name}"
                - name: EXPORT_NAMESPACE
                  value: "${schema.metadata.namespace}"
                - name: EXPORT_PATH
                  value: "${schema.spec.exportPath}"
                - name: CM_NAME
                  value: "${schema.metadata.name}-configmap"
                - name: CM_NAMESPACE
                  value: "${targetNamespace.metadata.name}"
                command: ["bash", "-c"]
                args:
                - |
                  set -e
                  echo "=== NFS Export Controller for $$EXPORT_NAME ==="

                  get_toolbox() {
                    kubectl get pod -n $$FS_NAMESPACE -l app=rook-ceph-tools -o jsonpath='{.items[0].metadata.name}'
                  }

                  # === Phase 1: Initial Setup ===
                  echo "[$$(/bin/date -Iseconds)] Phase 1: Initial setup"
                  TOOLBOX=$$(get_toolbox)
                  echo "Using toolbox: $$TOOLBOX"

                  NODE_IP=$$(kubectl get nodes -o json | jq -r '.items[0].status.addresses[] | select(.type=="InternalIP") | .address')

                  # Create subvolume (idempotent)
                  kubectl exec -n $$FS_NAMESPACE $$TOOLBOX -- ceph fs subvolume create $$FS_NAME $$EXPORT_NAME
                  echo "[$$(/bin/date -Iseconds)] Subvolume ensured"

                  # Get subvolume path
                  SUBVOLUME_PATH=$$(kubectl exec -n $$FS_NAMESPACE $$TOOLBOX -- ceph fs subvolume getpath $$FS_NAME $$EXPORT_NAME | tr -d '\r\n')

                  # Create NFS export (idempotent)
                  kubectl exec -n $$FS_NAMESPACE $$TOOLBOX -- ceph nfs export create cephfs $$NFS_SERVER $$EXPORT_PATH $$FS_NAME --path $$SUBVOLUME_PATH
                  echo "[$$(/bin/date -Iseconds)] NFS export ensured"

                  # Get pool info
                  POOL=$$(kubectl exec -n $$FS_NAMESPACE $$TOOLBOX -- bash -c "ceph fs subvolume info $$FS_NAME $$EXPORT_NAME --format json | python3 -c \"import sys,json; d=json.load(sys.stdin); print(d.get('pool_namespace','') or d.get('data_pool','unknown'))\"" 2>/dev/null || echo "unknown")
                  POOL=$$(echo "$$POOL" | tr -d '\r\n')

                  MOUNT_PATH="$$NODE_IP:$$EXPORT_PATH"

                  # Write initial ConfigMap
                  kubectl create configmap $$CM_NAME \
                    -n $$CM_NAMESPACE \
                    --from-literal=mountPath="$$MOUNT_PATH" \
                    --from-literal=nodePort="$$NODE_PORT" \
                    --from-literal=pool="$$POOL" \
                    --from-literal=subvolumePath="$$SUBVOLUME_PATH" \
                    --from-literal=clients="[]" \
                    --dry-run=client -o yaml | kubectl apply -f -
                  echo "[$$(/bin/date -Iseconds)] ConfigMap initialized"

                  # === Phase 2: Reconcile Loop ===
                  echo "[$$(/bin/date -Iseconds)] Phase 2: Starting watch loop"

                  reconcile() {
                    TOOLBOX=$$(get_toolbox)
                    DESIRED=$$(kubectl get nfsexport $$EXPORT_NAME -n $$EXPORT_NAMESPACE -o jsonpath='{.spec.clients}' 2>/dev/null || echo "[]")

                    ACTUAL=$$(kubectl exec -n $$FS_NAMESPACE $$TOOLBOX -- bash -c \
                      "ceph nfs export get $$NFS_SERVER $$EXPORT_PATH --format json 2>/dev/null" \
                      | python3 -c "import sys,json; print(json.dumps(json.load(sys.stdin).get('clients',[])))" \
                      2>/dev/null || echo "[]")
                    ACTUAL=$$(echo "$$ACTUAL" | tr -d '\r\n')

                    NEED_UPDATE=$$(python3 -c "
                  import json, sys
                  desired = json.loads(sys.argv[1])
                  actual = json.loads(sys.argv[2])
                  print('yes' if json.dumps(desired, sort_keys=True) != json.dumps(actual, sort_keys=True) else 'no')
                  " "$$DESIRED" "$$ACTUAL" 2>/dev/null || echo "no")

                    if [ "$$NEED_UPDATE" = "yes" ]; then
                      echo "[$$(/bin/date -Iseconds)] Drift detected, reconciling..."
                      EXPORT_DATA=$$(kubectl exec -n $$FS_NAMESPACE $$TOOLBOX -- \
                        ceph nfs export get $$NFS_SERVER $$EXPORT_PATH --format json 2>/dev/null || echo "{}")

                      UPDATED=$$(python3 -c "
                  import json, sys
                  e=json.loads(sys.argv[1])
                  e['clients']=json.loads(sys.argv[2])
                  print(json.dumps(e))
                  " "$$EXPORT_DATA" "$$DESIRED")

                      kubectl exec -n $$FS_NAMESPACE $$TOOLBOX -- bash -c "cat <<'INNER_EOF' > /tmp/nfs-export.json
                  $$UPDATED
                  INNER_EOF
                  ceph nfs export apply $$NFS_SERVER -i /tmp/nfs-export.json"
                      echo "[$$(/bin/date -Iseconds)] Ceph export updated"
                    fi

                    # Sync actual clients to ConfigMap
                    CURRENT=$$(kubectl exec -n $$FS_NAMESPACE $$TOOLBOX -- bash -c \
                      "ceph nfs export get $$NFS_SERVER $$EXPORT_PATH --format json 2>/dev/null" \
                      | python3 -c "import sys,json; print(json.dumps(json.load(sys.stdin).get('clients',[])))" \
                      2>/dev/null || echo "[]")
                    CURRENT=$$(echo "$$CURRENT" | tr -d '\r\n')

                    kubectl patch configmap $$CM_NAME -n $$CM_NAMESPACE \
                      --type merge -p "{\"data\":{\"clients\":\"$$CURRENT\"}}" \
                      2>/dev/null && echo "[$$(/bin/date -Iseconds)] ConfigMap synced" \
                      || echo "[$$(/bin/date -Iseconds)] ConfigMap patch failed"
                  }

                  # Initial reconcile
                  reconcile

                  # Watch for changes
                  while true; do
                    kubectl get nfsexport $$EXPORT_NAME -n $$EXPORT_NAMESPACE \
                      --watch --output-watch-events -o jsonpath='{.type} {.object.spec.clients}' 2>/dev/null \
                    | while read EVENT CLIENTS_VAL; do
                      echo "[$$(/bin/date -Iseconds)] Watch event: $$EVENT"
                      reconcile
                    done
                    echo "[$$(/bin/date -Iseconds)] Watch disconnected, reconnecting..."
                    sleep 3
                  done
{{- end }}