{{- if .Values.nfsServer.enabled -}}
{{- $namespace := include "rook-ceph-cluster.namespace" . -}}
---
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: nfs-export
spec:
  schema:
    apiVersion: v1alpha1
    kind: NFSExport
    spec:
      targetNamespace: string | required=true
      fsName: string | required=true
      exportPath: string | required=true
    status:
      configMapRef:
        name: ${configMap.metadata.name}
        namespace: ${configMap.metadata.namespace}
      cephFilesystemRef:
        name: ${cephFilesystem.metadata.name}
        namespace: ${cephFilesystem.metadata.namespace}
      cephNfsRef:
        name: ${cephNfs.metadata.name}
        namespace: ${cephNfs.metadata.namespace}
      serviceRef:
        name: ${service.metadata.name}
        namespace: ${service.metadata.namespace}

  resources:
    - id: cephFilesystem
      externalRef:
        apiVersion: ceph.rook.io/v1
        kind: CephFilesystem
        metadata:
          name: ${schema.spec.fsName}
          namespace: {{ $namespace }}

    - id: cephNfs
      externalRef:
        apiVersion: ceph.rook.io/v1
        kind: CephNFS
        metadata:
          name: ${schema.spec.fsName}-nfs
          namespace: {{ $namespace }}

    - id: service
      externalRef:
        apiVersion: v1
        kind: Service
        metadata:
          name: rook-ceph-nfs-${schema.spec.fsName}-nfs-external
          namespace: {{ $namespace }}

    - id: toolbox
      externalRef:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: rook-ceph-tools
          namespace: {{ $namespace }}
      readyWhen:
        - ${toolbox.status.readyReplicas == 1}

    - id: targetNamespace
      template:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.targetNamespace}

    - id: configMap
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.metadata.name}-configmap
          namespace: ${targetNamespace.metadata.name}
      readyWhen:
        - ${configMap.data.mountPath != ""}

    - id: job
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.metadata.name}-job
          namespace: {{ $namespace }}
        spec:
          ttlSecondsAfterFinished: 300
          template:
            spec:
              serviceAccountName: nfs-export-sa
              restartPolicy: Never
              containers:
              - name: nfs-export
                image: alpine/k8s:1.30.2
                command:
                - bash
                - -c
                - |
                  set -e
                  FS_NAMESPACE="{{ $namespace }}"
                  FS_NAME="${cephFilesystem.metadata.name}"
                  NFS_SERVER="${cephNfs.metadata.name}"
                  NODE_PORT="${string(service.spec.ports[0].nodePort)}"
                  EXPORT_NAME="${schema.metadata.name}"
                  EXPORT_PATH="${schema.spec.exportPath}"
                  TARGET_NAMESPACE="${targetNamespace.metadata.name}"

                  # Resolve toolbox pod
                  TOOLBOX=$$(kubectl get pod -n $$FS_NAMESPACE -l app=rook-ceph-tools -o jsonpath='{.items[0].metadata.name}')
                  echo "Using toolbox: $$TOOLBOX"

                  # Resolve node IP for external mount
                  NODE_IP=$$(kubectl get nodes -o json | jq -r '.items[0].status.addresses[] | select(.type=="InternalIP") | .address')

                  # Create subvolume (idempotent)
                  kubectl exec -n $$FS_NAMESPACE $$TOOLBOX -- ceph fs subvolume create $$FS_NAME $$EXPORT_NAME

                  # Get subvolume path
                  SUBVOLUME_PATH=$$(kubectl exec -n $$FS_NAMESPACE $$TOOLBOX -- ceph fs subvolume getpath $$FS_NAME $$EXPORT_NAME | tr -d '\r\n')

                  # Create NFS export (idempotent)
                  kubectl exec -n $$FS_NAMESPACE $$TOOLBOX -- ceph nfs export create cephfs $$NFS_SERVER $$EXPORT_PATH $$FS_NAME --path $$SUBVOLUME_PATH

                  # Get pool info
                  POOL=$$(kubectl exec -n $$FS_NAMESPACE $$TOOLBOX -- bash -c "ceph fs subvolume info $$FS_NAME $$EXPORT_NAME --format json | python3 -c \"import sys,json; d=json.load(sys.stdin); print(d.get('pool_namespace','') or d.get('data_pool','unknown'))\"" 2>/dev/null || echo "unknown")
                  POOL=$$(echo "$$POOL" | tr -d '\r\n')

                  # Get NFS export clients
                  CLIENTS=$$(kubectl exec -n $$FS_NAMESPACE $$TOOLBOX -- bash -c "ceph nfs export get $$NFS_SERVER $$EXPORT_PATH --format json | python3 -c \"import sys,json; d=json.load(sys.stdin); print(json.dumps(d.get('clients',[])))\"" 2>/dev/null || echo "[]")
                  CLIENTS=$$(echo "$$CLIENTS" | tr -d '\r\n')

                  MOUNT_PATH="$$NODE_IP:$$EXPORT_PATH"

                  # Write ConfigMap to target namespace
                  kubectl create configmap ${schema.metadata.name}-configmap \
                    -n $$TARGET_NAMESPACE \
                    --from-literal=mountPath="$$MOUNT_PATH" \
                    --from-literal=nodePort="$$NODE_PORT" \
                    --from-literal=pool="$$POOL" \
                    --from-literal=subvolumePath="$$SUBVOLUME_PATH" \
                    --from-literal=clients="$$CLIENTS" \
                    --dry-run=client -o yaml | kubectl apply -f -
      readyWhen:
        - ${job.status.succeeded == 1}
{{- end }}