rook-ceph-cluster:
  operatorNamespace: rook-ceph

  # -- CephCluster configuration
  # See: https://rook.io/docs/rook/latest/CRDs/Cluster/ceph-cluster-crd/
  cephClusterSpec:
    cephVersion:
      # TODO: update to match your desired Ceph version
      allowUnsupported: false
    mon:
      count: 3
      allowMultiplePerNode: true
    mgr:
      count: 2
      allowMultiplePerNode: true
    dashboard:
      enabled: false
    network:
      provider: host
    storage:
      useAllNodes: true
      useAllDevices: true

  # -- CephBlockPool and StorageClass for RBD (block storage)
  cephBlockPools:
    - name: ceph-blockpool
      spec:
        failureDomain: osd
        replicated:
          size: 3
      storageClass:
        enabled: true
        name: ceph-block
        isDefault: true
        reclaimPolicy: Delete
        allowVolumeExpansion: true
        parameters:
          imageFormat: "2"
          imageFeatures: layering

  # -- CephFilesystem and StorageClass for CephFS (shared filesystem)
  cephFileSystems:
    - name: ceph-filesystem
      spec:
        metadataPool:
          replicated:
            size: 3
        dataPools:
          - failureDomain: osd
            replicated:
              size: 3
            name: data0
        metadataServer:
          activeCount: 1
          activeStandby: true
      storageClass:
        enabled: true
        name: ceph-filesystem
        reclaimPolicy: Delete
        allowVolumeExpansion: true
        pool: data0

  # -- CephObjectStore (S3-compatible object storage)
  cephObjectStores:
    - name: ceph-objectstore
      spec:
        metadataPool:
          failureDomain: osd
          replicated:
            size: 3
        dataPool:
          failureDomain: osd
          erasureCoded:
            dataChunks: 2
            codingChunks: 1
        gateway:
          port: 8301
          instances: 1
          priorityClassName: system-cluster-critical
      storageClass:
        enabled: true
        name: ceph-bucket
        reclaimPolicy: Delete
        volumeBindingMode: Immediate

# -- NodePort Service for ObjectStore RGW
objectstoreService:
  enabled: true
  storeName: ceph-objectstore
  clusterName: rook-ceph
  nodePort: null

# -- RBAC: allow all authenticated users to create Ceph object store users and access their secrets
objectstoreRbac:
  enabled: true
