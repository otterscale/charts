rook-ceph-cluster:
  operatorNamespace: rook-ceph

  # -- CephCluster configuration
  # See: https://rook.io/docs/rook/latest/CRDs/Cluster/ceph-cluster-crd/
  cephClusterSpec:
    mon:
      count: 1
      allowMultiplePerNode: false
    mgr:
      count: 1
      allowMultiplePerNode: false
    dashboard:
      enabled: false
    network:
      provider: host
    storage:
      useAllNodes: true
      useAllDevices: true
    disruptionManagement:
      managePodBudgets: false

  # -- CephBlockPool and StorageClass for RBD (block storage)
  cephBlockPools:
    - name: ceph-blockpool
      spec:
        failureDomain: osd
        replicated:
          size: 1
          requireSafeReplicaSize: false
      storageClass:
        enabled: true
        name: ceph-block
        isDefault: true
        reclaimPolicy: Delete
        allowVolumeExpansion: true
        parameters:
          imageFormat: "2"
          imageFeatures: layering

  # -- CephFilesystem and StorageClass for CephFS (shared filesystem)
  cephFileSystems:
    - name: ceph-filesystem
      spec:
        metadataPool:
          replicated:
            size: 1
            requireSafeReplicaSize: false
        dataPools:
          - failureDomain: osd
            replicated:
              size: 1
              requireSafeReplicaSize: false
            name: data0
        metadataServer:
          activeCount: 1
          activeStandby: false
      storageClass:
        enabled: true
        name: ceph-filesystem
        reclaimPolicy: Delete
        allowVolumeExpansion: true
        pool: data0

  # -- CephObjectStore (S3-compatible object storage)
  cephObjectStores:
    - name: ceph-objectstore
      spec:
        metadataPool:
          failureDomain: osd
          replicated:
            size: 1
            requireSafeReplicaSize: false
        dataPool:
          failureDomain: osd
          replicated:
            size: 1
            requireSafeReplicaSize: false
        gateway:
          port: 8301
          instances: 1
          priorityClassName: system-cluster-critical
      storageClass:
        enabled: true
        name: ceph-bucket
        reclaimPolicy: Delete
        volumeBindingMode: Immediate

  # -- Enable monitoring with Prometheus and Grafana
  monitoring:
    enabled: true

# -- NodePort Service for ObjectStore RGW
objectstoreService:
  enabled: true
  storeName: ceph-objectstore
  clusterName: rook-ceph
  nodePort: null

# -- RBAC: allow all authenticated users to create Ceph object store users and access their secrets
objectstoreRbac:
  enabled: true
