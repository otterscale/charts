apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: quick-job
spec:
  schema:
    apiVersion: v1alpha1
    kind: QuickJob
    spec:
      name: string | description="Name of the Job and related resources."
      image: string | description="Container image name, for example nginx:1.27."
      command: '[]string | description="Entrypoint array. Not executed within a shell."'
      args: '[]string | description="Arguments to the entrypoint."'
      completions: integer | default=1 description="Desired number of successfully finished Pods for the Job."
      parallelism: integer | default=1 description="Maximum desired number of Pods running at any given time."
      backoffLimit: integer | default=6 description="Number of retries before marking this Job failed."
      activeDeadlineSeconds: integer | default=3600 description="Duration in seconds relative to startTime that the Job may remain active before termination."
      ttlSecondsAfterFinished: integer | default=86400 description="TTL in seconds to retain a finished Job before it is eligible for automatic cleanup."
      suspend: boolean | default=false description="Suspend controls whether the Job controller should create Pods."
      restartPolicy: string | default="Never" description="Pod restart policy. Valid values are Never or OnFailure for Jobs."
      containerPort: integer | default=8080 description="Container port exposed by the workload."
      resourcesRequestsCpu: string | default="100m" description="CPU request for the container."
      resourcesRequestsMemory: string | default="128Mi" description="Memory request for the container."
      resourcesGpu: string | default="0" description="GPU request and limit value for nvidia.com/gpu."
      resourcesGpumem: string | default="0" description="GPU memory request and limit value for nvidia.com/gpumem."
      resourcesLimitsCpu: string | default="500m" description="CPU limit for the container."
      resourcesLimitsMemory: string | default="512Mi" description="Memory limit for the container."
    status:
      succeeded: ${job.status.succeeded}
      failed: ${job.status.failed}
      active: ${job.status.active}
      status: "${has(job.status.conditions) && job.status.conditions.exists(c, c.type == 'Complete' && c.status == 'True') ? 'Complete' : (has(job.status.conditions) && job.status.conditions.exists(c, c.type == 'Failed' && c.status == 'True') ? 'Failed' : 'Running')}"
      completions: "${has(job.status.succeeded) ? string(job.status.succeeded) : '0'}/${has(job.spec.completions) ? string(job.spec.completions) : '1'}"
      startTime: "${has(job.status.startTime) ? string(job.status.startTime) : ''}"
      completionTime: "${has(job.status.completionTime) ? string(job.status.completionTime) : ''}"

  resources:
    - id: job
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}
        spec:
          completions: ${schema.spec.completions}
          parallelism: ${schema.spec.parallelism}
          backoffLimit: ${schema.spec.backoffLimit}
          activeDeadlineSeconds: ${schema.spec.activeDeadlineSeconds}
          ttlSecondsAfterFinished: ${schema.spec.ttlSecondsAfterFinished}
          suspend: ${schema.spec.suspend}
          template:
            metadata:
              labels:
                app: ${schema.spec.name}
            spec:
              restartPolicy: ${schema.spec.restartPolicy}
              containers:
                - name: ${schema.spec.name}
                  image: ${schema.spec.image}
                  command: ${schema.spec.command}
                  args: ${schema.spec.args}
                  ports:
                    - containerPort: ${schema.spec.containerPort}
                  resources:
                    requests:
                      cpu: ${schema.spec.resourcesRequestsCpu}
                      memory: ${schema.spec.resourcesRequestsMemory}
                      nvidia.com/gpu: ${schema.spec.resourcesGpu}
                      nvidia.com/gpumem: ${schema.spec.resourcesGpumem}
                    limits:
                      cpu: ${schema.spec.resourcesLimitsCpu}
                      memory: ${schema.spec.resourcesLimitsMemory}
                      nvidia.com/gpu: ${schema.spec.resourcesGpu}
                      nvidia.com/gpumem: ${schema.spec.resourcesGpumem}
