apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: quick-cronjob
spec:
  schema:
    apiVersion: v1alpha1
    kind: QuickCronJob
    spec:
      name: string | description="Name of the CronJob and related resources."
      image: string | description="Container image name, for example ubuntu:24.04."
      command: '[]string | description="Entrypoint array. Not executed within a shell."'
      args: '[]string | description="Arguments to the entrypoint."'
      cronSchedule: string | default="*/5 * * * *" description="Cron format schedule string, for example */5 * * * *."
      concurrencyPolicy: string | description="How to treat concurrent executions. Valid values are Allow, Forbid, or Replace."
      suspend: boolean | description="Suspend controls whether subsequent executions are suspended."
      successfulJobsHistoryLimit: integer | description="Number of successful finished Jobs to retain."
      failedJobsHistoryLimit: integer | description="Number of failed finished Jobs to retain."
      restartPolicy: string | default="OnFailure" description="Pod restart policy for CronJob Job template. Valid values are Never or OnFailure."
      containerPort: integer | default=8080 description="Container port exposed by the workload."
      resourcesRequestsCpu: string | default="100m" description="CPU request for the container."
      resourcesRequestsMemory: string | default="128Mi" description="Memory request for the container."
      resourcesGpu: string | default="0" description="GPU request and limit value for nvidia.com/gpu."
      resourcesGpumem: string | default="0" description="GPU memory request and limit value for nvidia.com/gpumem."
      resourcesLimitsCpu: string | default="500m" description="CPU limit for the container."
      resourcesLimitsMemory: string | default="512Mi" description="Memory limit for the container."
    status:
      lastScheduleTime: "${has(cronjob.status.lastScheduleTime) ? string(cronjob.status.lastScheduleTime) : ''}"

  resources:
    - id: cronjob
      template:
        apiVersion: batch/v1
        kind: CronJob
        metadata:
          name: ${schema.spec.name}
        spec:
          schedule: "${schema.spec.cronSchedule}"
          concurrencyPolicy: "${has(schema.spec.concurrencyPolicy) ? schema.spec.concurrencyPolicy : 'Allow'}"
          suspend: "${has(schema.spec.suspend) ? schema.spec.suspend : false}"
          successfulJobsHistoryLimit: "${has(schema.spec.successfulJobsHistoryLimit) ? schema.spec.successfulJobsHistoryLimit : 3}"
          failedJobsHistoryLimit: "${has(schema.spec.failedJobsHistoryLimit) ? schema.spec.failedJobsHistoryLimit : 1}"
          jobTemplate:
            spec:
              template:
                metadata:
                  labels:
                    app: ${schema.spec.name}
                spec:
                  restartPolicy: ${has(schema.spec.restartPolicy)
                  containers:
                    - name: ${schema.spec.name}
                      image: ${schema.spec.image}
                      command: ${schema.spec.command}
                      args: ${schema.spec.args}
                      ports:
                        - containerPort: ${schema.spec.containerPort}
                      resources:
                        requests:
                          cpu: ${schema.spec.resourcesRequestsCpu}
                          memory: ${schema.spec.resourcesRequestsMemory}
                          nvidia.com/gpu: ${schema.spec.resourcesGpu}
                          nvidia.com/gpumem: ${schema.spec.resourcesGpumem}
                        limits:
                          cpu: ${schema.spec.resourcesLimitsCpu}
                          memory: ${schema.spec.resourcesLimitsMemory}
                          nvidia.com/gpu: ${schema.spec.resourcesGpu}
                          nvidia.com/gpumem: ${schema.spec.resourcesGpumem}
