apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: quick-deployment
spec:
  schema:
    apiVersion: v1alpha1
    kind: QuickDeployment
    spec:
      name: string | description="Name of the Deployment and related resources."
      image: string | description="Container image name, for example nginx:1.27."
      command: '[]string | description="Entrypoint array. Not executed within a shell."'
      args: '[]string | description="Arguments to the entrypoint."'
      containerPort: integer | default=80 description="Container port exposed by the workload."
      serviceType: string | default="ClusterIP" description="Service type. Use ClusterIP for internal access or NodePort for node-level access."
      serviceNodePort: integer | description="NodePort value when serviceType is NodePort. Valid range is typically 30000-32767."
      replicas: integer | default=1 description="Desired number of Pod replicas."
      storageSize: string | description="Optional. PersistentVolumeClaim requested storage size. If empty, PVC is not created."
      accessMode: string | description="Optional. PersistentVolumeClaim access mode, for example ReadWriteOnce or ReadOnlyMany. If empty, PVC is not created."
      mountPath: string | description="Mount path for the persistent volume inside the container."
      resourcesRequestsCpu: string | default="100m" description="CPU request for the container."
      resourcesRequestsMemory: string | default="128Mi" description="Memory request for the container."
      resourcesGpu: string | default="0" description="GPU request and limit value for nvidia.com/gpu."
      resourcesGpumem: string | default="0" description="GPU memory request and limit value for nvidia.com/gpumem."
      resourcesLimitsCpu: string | default="500m" description="CPU limit for the container."
      resourcesLimitsMemory: string | default="512Mi" description="Memory limit for the container."
    status:
      deploymentWithPvcConditions: ${deploymentWithPvc.status.conditions}
      deploymentNoPvcConditions: ${deploymentNoPvc.status.conditions}
      availableReplicas: "${has(deploymentWithPvc.status.availableReplicas) ? deploymentWithPvc.status.availableReplicas : deploymentNoPvc.status.availableReplicas}"
      serviceType: "${has(serviceNodePort.spec.type) ? serviceNodePort.spec.type : serviceClusterIp.spec.type}"
      nodePort: "${has(serviceNodePort.spec.ports[0].nodePort) ? serviceNodePort.spec.ports[0].nodePort : 0}"

  resources:
    - id: deploymentWithPvc
      includeWhen:
        - ${has(schema.spec.storageSize) && has(schema.spec.accessMode) && has(schema.spec.mountPath) && schema.spec.storageSize != "" && schema.spec.accessMode != "" && schema.spec.mountPath != ""}
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.spec.name}
        spec:
          replicas: ${schema.spec.replicas}
          selector:
            matchLabels:
              app: ${schema.spec.name}
          template:
            metadata:
              labels:
                app: ${schema.spec.name}
            spec:
              containers:
                - name: ${schema.spec.name}
                  image: ${schema.spec.image}
                  command: ${schema.spec.command}
                  args: ${schema.spec.args}
                  ports:
                    - containerPort: ${schema.spec.containerPort}
                  resources:
                    requests:
                      cpu: ${schema.spec.resourcesRequestsCpu}
                      memory: ${schema.spec.resourcesRequestsMemory}
                      nvidia.com/gpu: ${schema.spec.resourcesGpu}
                      nvidia.com/gpumem: ${schema.spec.resourcesGpumem}
                    limits:
                      cpu: ${schema.spec.resourcesLimitsCpu}
                      memory: ${schema.spec.resourcesLimitsMemory}
                      nvidia.com/gpu: ${schema.spec.resourcesGpu}
                      nvidia.com/gpumem: ${schema.spec.resourcesGpumem}
                  volumeMounts:
                    - name: app-storage
                      mountPath: ${schema.spec.mountPath}
              volumes:
                - name: app-storage
                  persistentVolumeClaim:
                    claimName: ${pvc.metadata.name}

    - id: deploymentNoPvc
      includeWhen:
        - ${!has(schema.spec.storageSize) || !has(schema.spec.accessMode) || !has(schema.spec.mountPath) || schema.spec.storageSize == "" || schema.spec.accessMode == "" || schema.spec.mountPath == ""}
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.spec.name}
        spec:
          replicas: ${schema.spec.replicas}
          selector:
            matchLabels:
              app: ${schema.spec.name}
          template:
            metadata:
              labels:
                app: ${schema.spec.name}
            spec:
              containers:
                - name: ${schema.spec.name}
                  image: ${schema.spec.image}
                  command: ${schema.spec.command}
                  args: ${schema.spec.args}
                  ports:
                    - containerPort: ${schema.spec.containerPort}
                  resources:
                    requests:
                      cpu: ${schema.spec.resourcesRequestsCpu}
                      memory: ${schema.spec.resourcesRequestsMemory}
                      nvidia.com/gpu: ${schema.spec.resourcesGpu}
                      nvidia.com/gpumem: ${schema.spec.resourcesGpumem}
                    limits:
                      cpu: ${schema.spec.resourcesLimitsCpu}
                      memory: ${schema.spec.resourcesLimitsMemory}
                      nvidia.com/gpu: ${schema.spec.resourcesGpu}
                      nvidia.com/gpumem: ${schema.spec.resourcesGpumem}

    - id: serviceClusterIp
      includeWhen:
        - ${schema.spec.serviceType == "ClusterIP"}
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${schema.spec.name}-svc
        spec:
          type: ${schema.spec.serviceType}
          selector:
            app: ${schema.spec.name}
          ports:
            - protocol: TCP
              port: ${schema.spec.containerPort}
              targetPort: ${schema.spec.containerPort}

    - id: serviceNodePort
      includeWhen:
        - ${schema.spec.serviceType == "NodePort"}
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${schema.spec.name}-svc
        spec:
          type: ${schema.spec.serviceType}
          selector:
            app: ${schema.spec.name}
          ports:
            - protocol: TCP
              port: ${schema.spec.containerPort}
              targetPort: ${schema.spec.containerPort}
              nodePort: ${schema.spec.serviceNodePort}

    - id: pvc
      includeWhen:
        - ${has(schema.spec.storageSize) && has(schema.spec.accessMode) && schema.spec.storageSize != "" && schema.spec.accessMode != ""}
      template:
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: ${schema.spec.name}-pvc
        spec:
          accessModes:
            - ${schema.spec.accessMode}
          resources:
            requests:
              storage: ${schema.spec.storageSize}
