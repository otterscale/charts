apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    {{- include "otterscale-workload-operator.labels" . | nindent 4 }}
  name: workload-operator-leader-election-rolebinding
  namespace: {{ .Values.namespace.name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: workload-operator-leader-election-role
subjects:
- kind: ServiceAccount
  name: {{ include "otterscale-workload-operator.serviceAccountName" . }}
  namespace: {{ .Values.namespace.name }}
