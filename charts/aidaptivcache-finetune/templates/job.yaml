{{- $outputImage := .Values.outputImage | default dict -}}
{{- $outputEnabled := (get $outputImage "enabled") | default false -}}
{{- $outputType := (get $outputImage "type") | default "" -}}
{{- if and $outputEnabled (not (or (eq $outputType "crane") (eq $outputType "kitops"))) -}}
{{- fail (printf "Invalid outputImage.type: %q. Must be 'crane' or 'kitops'." $outputType) -}}
{{- end -}}

apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "aidaptivcache-finetune.fullname" . }}
  labels:
    {{- include "aidaptivcache-finetune.labels" . | nindent 4 }}
spec:
  backoffLimit: {{ .Values.job.backoffLimit }}
  {{- if .Values.job.ttlSecondsAfterFinished }}
  ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "aidaptivcache-finetune.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: {{ .Values.job.restartPolicy }}
      {{- if .Values.schedulerName }}
      schedulerName: {{ .Values.schedulerName }}
      {{- end }}
      initContainers:
      {{- if .Values.initContainer.enabled }}
      - name: model-loader
        image: "{{ .Values.initContainer.image.repository }}:{{ .Values.initContainer.image.tag }}"
        imagePullPolicy: {{ .Values.initContainer.image.pullPolicy }}
        command:
        - /bin/sh
        - -c
        - |
          set -eu
          MODEL_SOURCE_PATH={{ .Values.initContainer.modelSourcePath | quote }}
          SHARED_DATA_PATH={{ .Values.initContainer.sharedDataPath | quote }}

          cp -a "$MODEL_SOURCE_PATH/" "$SHARED_DATA_PATH/"
          echo "Model copied from $MODEL_SOURCE_PATH to $SHARED_DATA_PATH"
          {{- if .Values.prescript }}
{{ .Values.prescript | indent 10 }}
          {{- end }}
        volumeMounts:
        - name: shared-data
          mountPath: {{ .Values.initContainer.sharedDataPath }}
      {{- end }}
      {{- if and .Values.outputImage.enabled (eq .Values.outputImage.type "crane") }}
      - name: crane-setup
        image: {{ include "aidaptivcache-finetune.craneImage" . | quote }}
        imagePullPolicy: IfNotPresent
        command: ["cp", "/ko-app/crane", "/crane-bin/crane"]
        volumeMounts:
        - name: crane-bin
          mountPath: /crane-bin
      {{- end }}
      {{- if and .Values.outputImage.enabled (eq .Values.outputImage.type "kitops") }}
      - name: kitops-setup
        image: {{ include "aidaptivcache-finetune.kitopsImage" . | quote }}
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - |
          cp -a {{ .Values.outputImage.kitops.binPath | default "/usr/local/bin/kit" | quote }} /kitops-bin/kit
          chmod +x /kitops-bin/kit
        volumeMounts:
        - name: kitops-bin
          mountPath: /kitops-bin
      {{- end }}
      containers:
      - name: finetune
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
        - /bin/sh
        - -c
        - |
          set -eu

          OUTPUT_DIR={{ .Values.envConfig.pathSettings.outputDir | quote }}
          OUTPUT_IMAGE_REPO={{ .Values.outputImage.repository | quote }}
          OUTPUT_IMAGE_TAG={{ .Values.outputImage.tag | quote }}
          CRANE_BASE_IMAGE={{ include "aidaptivcache-finetune.craneBaseImage" . | quote }}

          mkdir -p "$OUTPUT_DIR"
          echo "Starting training job..."
          phisonai2 --env_config /config/env/env_config.yaml --exp_config /config/exp/exp_config.yaml
          TRAIN_EXIT_CODE=$?
          echo "Training finished with exit code: $TRAIN_EXIT_CODE"
          {{- if .Values.outputImage.enabled }}
          if [ $TRAIN_EXIT_CODE -eq 0 ]; then
            {{- if eq .Values.outputImage.type "crane" }}
            echo "Packaging output model as OCI image (crane)..."
            mkdir -p "$OUTPUT_DIR"
            MODEL_TAR=$(mktemp)
            tar -cf "$MODEL_TAR" -C "$OUTPUT_DIR" .
            {{ include "aidaptivcache-finetune.craneBin" . }} append \
              --base "$CRANE_BASE_IMAGE" \
              -f "$MODEL_TAR" \
              {{- if .Values.outputImage.insecure }}
              --insecure \
              {{- end }}
              -t "$OUTPUT_IMAGE_REPO:$OUTPUT_IMAGE_TAG"
            PUSH_EXIT_CODE=$?
            rm -f "$MODEL_TAR"
            {{- else if eq .Values.outputImage.type "kitops" }}
            echo "Packaging output model as ModelKit (kitops)..."
            mkdir -p "$OUTPUT_DIR"
            {{ include "aidaptivcache-finetune.kitopsBin" . }} init "$OUTPUT_DIR"
            {{ include "aidaptivcache-finetune.kitopsBin" . }} pack "$OUTPUT_DIR" \
              --use-model-pack \
              -t "$OUTPUT_IMAGE_REPO:$OUTPUT_IMAGE_TAG"
            PACK_EXIT_CODE=$?
            if [ $PACK_EXIT_CODE -ne 0 ]; then
              echo "Failed to pack model (exit code: $PACK_EXIT_CODE)"
              exit $PACK_EXIT_CODE
            fi
            {{ include "aidaptivcache-finetune.kitopsBin" . }} push "$OUTPUT_IMAGE_REPO:$OUTPUT_IMAGE_TAG"{{ if .Values.outputImage.insecure }} --plain-http{{ end }}
            PUSH_EXIT_CODE=$?
            {{- end }}
            if [ $PUSH_EXIT_CODE -eq 0 ]; then
              echo "Model pushed to $OUTPUT_IMAGE_REPO:$OUTPUT_IMAGE_TAG"
            else
              echo "Failed to push model (exit code: $PUSH_EXIT_CODE)"
              exit $PUSH_EXIT_CODE
            fi
          fi
          {{- end }}
          exit $TRAIN_EXIT_CODE
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        {{- if .Values.modelImage.enabled }}
        - name: model-volume
          mountPath: {{ .Values.modelImage.mountPath }}
          readOnly: true
        {{- end }}
        {{- if .Values.initContainer.enabled }}
        - name: shared-data
          mountPath: {{ .Values.initContainer.sharedDataPath }}
        {{- end }}
        {{- if and .Values.outputImage.enabled (eq .Values.outputImage.type "crane") }}
        - name: crane-bin
          mountPath: /crane-bin
          readOnly: true
        {{- end }}
        {{- if and .Values.outputImage.enabled (eq .Values.outputImage.type "kitops") }}
        - name: kitops-bin
          mountPath: /kitops-bin
          readOnly: true
        {{- end }}
        {{- if .Values.outputImage.pushSecret }}
        - name: docker-config
          mountPath: /root/.docker
          readOnly: true
        {{- end }}
        - name: env-config
          mountPath: /config/env
          readOnly: true
        - name: exp-config
          mountPath: /config/exp
          readOnly: true
        - name: train-data-config
          mountPath: /config/train_data
          readOnly: true
      volumes:
      {{- if .Values.modelImage.enabled }}
      - name: model-volume
        image:
          reference: {{ .Values.modelImage.reference | quote }}
          pullPolicy: {{ .Values.modelImage.pullPolicy }}
      {{- end }}
      {{- if .Values.initContainer.enabled }}
      - name: shared-data
        emptyDir: {}
      {{- end }}
      {{- if and .Values.outputImage.enabled (eq .Values.outputImage.type "crane") }}
      - name: crane-bin
        emptyDir: {}
      {{- end }}
      {{- if and .Values.outputImage.enabled (eq .Values.outputImage.type "kitops") }}
      - name: kitops-bin
        emptyDir: {}
      {{- end }}
      {{- if .Values.outputImage.pushSecret }}
      - name: docker-config
        secret:
          secretName: {{ .Values.outputImage.pushSecret }}
          items:
          - key: .dockerconfigjson
            path: config.json
      {{- end }}
      - name: env-config
        configMap:
          name: {{ include "aidaptivcache-finetune.fullname" . }}-env-config
      - name: exp-config
        configMap:
          name: {{ include "aidaptivcache-finetune.fullname" . }}-exp-config
      - name: train-data-config
        configMap:
          name: {{ include "aidaptivcache-finetune.fullname" . }}-train-data
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
