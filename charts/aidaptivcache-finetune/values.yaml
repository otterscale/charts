image:
  repository: docker.io/library/aidaptiv
  tag: vNXUN_2_05BA0
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Model image volume (OCI image as volume - requires Kubernetes 1.31+ with ImageVolume feature gate)
modelImage:
  enabled: false
  reference: "docker.io/library/tinyllama-1.1b:latest"
  pullPolicy: IfNotPresent
  mountPath: /data/model

# Init container: copies base model from the model image into a shared emptyDir volume.
initContainer:
  enabled: true
  image:
    repository: docker.io/library/tiny_model
    tag: latest
    pullPolicy: IfNotPresent
  modelSourcePath: /app/TinyLlama-1.1B-Chat-v1.0
  sharedDataPath: /data

# Output model: package finetuned model as OCI image and push to registry after training.
outputImage:
  enabled: true
  repository: "<ip>:<port>/finetuned-model"
  tag: "latest"
  baseImage: "busybox:latest"
  crane:
    # Use Image Volume (requires Kubernetes 1.31+ with ImageVolume feature gate).
    # When false, uses an init container to copy the crane binary instead.
    useImageVolume: false
    # Override crane image (default: crane:debug for initContainer, crane:latest for imageVolume)
    # image: "gcr.io/go-containerregistry/crane:debug"
  # Use plain HTTP instead of HTTPS when pushing to the registry.
  insecure: true
  # Name of a K8s Secret (type: kubernetes.io/dockerconfigjson) for registry push auth.
  # Leave empty if the registry is public or uses node-level credentials.
  pushSecret: ""

job:
  backoffLimit: 1
  restartPolicy: Never
  ttlSecondsAfterFinished: 60

# Environment configuration for phisonai2
envConfig:
  pathSettings:
    lora:
      loraWeight: ""
      loraOptimizer: ""
      loraOutputDir: ""
    modelNameOrPath: "/data/TinyLlama-1.1B-Chat-v1.0"
    multiNodeEnvPath: null
    optimizerPath: ""
    trainDataPath:
      - /config/train_data/QA_dataset_config.yaml
    valDataPath: null
    nvmePath: "/mnt/nvme0"
    outputDir: "/data/output"
    logName: "output.log"

# Experiment configuration
expConfig:
  processSettings:
    numGpus: 1
    specifyGpus: null
    masterPort: 8299
    multiNodeSettings:
      enable: false
      masterAddr: "127.0.0.1"

  runSettings:
    taskType: "text-generation"
    taskMode: "train"
    perDeviceTrainBatchSize: 4
    perUpdateTotalBatchSize: 16
    numTrainEpochs: 1
    maxIter: 12
    maxSeqLen: 2048
    triton: true
    weightFileFormat: null
    fromConfig: false
    precisionMode: 1
    enableSaveOptimizerState: false

    modelSaver:
      maxNumOfSavedModelOnEpochEnd: -1
      enableSaveModelOnIteration: false
      maxNumOfSavedModelOnIteration: 2
      numOfIterationToSaveModel: 2

    lrScheduler:
      mode: 1
      learningRate: 0.000007

    optimizer:
      beta1: 0.9
      beta2: 0.95
      eps: 0.00000001
      weightDecay: 0.01

    earlyStop:
      enable: false
      minDelta: 0.01
      patience: 2
      verbose: false

    lora:
      enableLora: false
      loraRank: 8
      loraAlpha: 16
      loraTaskType: "CAUSAL_LM"
      loraTargetModules: null

# Training data configuration
trainDataConfig: |
  instruction-dataset:
    data_path: "HuggingFaceH4/instruction-dataset"
    strategy: "QA"
    system_prompt: "A chat between a curious user and an artificial intelligence assistant. The assistant gives helpful, detailed, and polite answers to the user's questions."
    user_prompt: "{question}"
    question_key: "prompt"
    answer_key: "completion"
    exp_type: train
    label_key: "completion"

# Extra commands to run in initContainer after model copy
prescript: ""

